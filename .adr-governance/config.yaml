# ADR Governance Configuration
#
# This file is the single source of truth for governance rules that the CI
# pipeline enforces. It is platform-agnostic — the same config works on
# GitHub, Azure DevOps, GitLab, and any other Git platform.
#
# Changes to this file should be reviewed by the architecture team.

governance:
  # ──────────────────────────────────────────────────────────────────────
  # Administrators
  # ──────────────────────────────────────────────────────────────────────
  # ADR Administrators can make maintenance (non-substantive) changes to
  # any ADR without requiring the original ADR approvers to re-approve.
  # They still need a standard PR approval via branch protection, but the
  # verify-approvals.py identity check is skipped for maintenance changes.
  #
  # Identity format: use the same format as approvals[].identity — the
  # platform handle without the '@' prefix.
  admins:
    - identity: "ivanstambuk"
      name: "Ivan Stambuk"

  # ──────────────────────────────────────────────────────────────────────
  # Single ADR per PR
  # ──────────────────────────────────────────────────────────────────────
  # When true, a PR may only modify ONE ADR file. This ensures each merge
  # commit maps to exactly one architectural decision, keeping the audit
  # trail clean.
  #
  # Exception: supersession pairs. When a new ADR supersedes an old one,
  # the PR must touch exactly two ADRs: the new one (with lifecycle.supersedes)
  # and the old one (with status: superseded and lifecycle.superseded_by).
  # The CI script validates this automatically.
  single_adr_per_pr: true

  # ──────────────────────────────────────────────────────────────────────
  # Sequential ADR Numbering
  # ──────────────────────────────────────────────────────────────────────
  # When true, new ADR files in adr_directory must use the next available
  # sequential number (ADR-NNNN). No gaps or conflicts are allowed.
  #
  # The check only applies to NEW files — modifications to existing ADRs
  # are not affected. The check determines the highest ADR number on the
  # base branch and requires the new ADR to use (max + 1).
  #
  # Race condition safety: enable "Require branches to be up to date
  # before merging" (GitHub), semi-linear merge (Azure DevOps), or merge
  # trains (GitLab) to ensure two PRs cannot claim the same number.
  sequential_numbering: true

  # The directory containing governed ADRs (not examples).
  # Sequential numbering is only enforced in this directory.
  adr_directory: architecture-decision-log

  # ──────────────────────────────────────────────────────────────────────
  # Change Classification — Substantive Fields
  # ──────────────────────────────────────────────────────────────────────
  # Changes to these YAML fields are classified as "substantive" (Tier 1)
  # and require the original ADR approvers (via approvals[].identity) to
  # re-approve. All other field changes are "maintenance" (Tier 2) and
  # can be made by an ADR Administrator without ADR re-approval.
  #
  # IMPORTANT: For ADRs that were already accepted on the base branch,
  # this list is no longer the final rule. Accepted ADRs have an immutable
  # decision core (see immutable_after_acceptance_fields below). Attempts
  # to edit that core in place are blocked outright and must be handled by
  # creating a new superseding ADR.
  #
  # These are dotted YAML paths. A change to any key under these prefixes
  # is considered substantive.
  substantive_fields:
    - "adr.status"
    - "adr.title"
    - "decision" # decision.chosen_alternative, decision.rationale, etc.
    - "alternatives" # any change to alternatives array
    - "consequences" # positive or negative consequences
    - "approvals" # adding/removing/changing approvers
    - "context.summary" # changing the problem statement (not drivers/constraints)

  # ──────────────────────────────────────────────────────────────────────
  # Accepted ADRs — Immutable Decision Core
  # ──────────────────────────────────────────────────────────────────────
  # Once an ADR is accepted, the fields below may not be edited in place.
  # The accepted ADR may:
  #   - remain accepted
  #   - transition to superseded
  #   - transition to deprecated
  #
  # Allowed post-acceptance updates live outside this list, for example:
  #   - confirmation
  #   - lifecycle review/supersession metadata
  #   - references
  #   - adr.last_modified / adr.version / adr.tags / adr.schema_version
  #   - audit_trail (append-only)
  #
  # To change the actual decision, rationale, alternatives, consequences,
  # or governing context of an accepted ADR, create a new ADR and supersede
  # the old one instead of editing it in place.
  immutable_after_acceptance_fields:
    - "adr.id"
    - "adr.title"
    - "adr.summary"
    - "adr.project"
    - "adr.component"
    - "adr.priority"
    - "adr.decision_type"
    - "adr.created_at"
    - "authors"
    - "decision_owner"
    - "reviewers"
    - "approvals"
    - "context"
    - "architecturally_significant_requirements"
    - "alternatives"
    - "decision"
    - "consequences"
    - "dependencies"

  # ──────────────────────────────────────────────────────────────────────
  # Maintenance Fields (implicit)
  # ──────────────────────────────────────────────────────────────────────
  # Any field NOT listed in substantive_fields is automatically Tier 2
  # (maintenance) for non-accepted ADRs. For already accepted ADRs, these
  # changes are allowed only if they do not touch immutable_after_acceptance_fields.
  # Common maintenance fields include (some of these are only editable before
  # acceptance; accepted ADRs must still respect immutable_after_acceptance_fields):
  #
  #   - adr.schema_version         (schema migration)
  #   - adr.last_modified          (timestamp update)
  #   - adr.tags                   (adding/removing tags)
  #   - adr.component              (renaming component)
  #   - authors[].email            (email correction)
  #   - reviewers                  (adding reviewers)
  #   - context.business_drivers   (clarification, not reframing)
  #   - context.technical_drivers  (clarification)
  #   - context.constraints        (adding discovered constraints)
  #   - context.assumptions        (adding discovered assumptions)
  #   - architecturally_significant_requirements  (adding/updating ASRs)
  #   - dependencies               (updating dependency list)
  #   - references                 (adding links)
  #   - lifecycle.next_review_date (review cadence update)
  #   - lifecycle.review_cycle_months
  #   - audit_trail                (appending events only; edit/delete/reorder is blocked by CI)
  #   - confirmation               (backfilling artifact IDs)

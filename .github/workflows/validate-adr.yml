name: Validate ADR

on:
  pull_request:
    paths:
      - "architecture-decision-log/**"
      - "examples/**"
      - "schemas/**"
      - "scripts/validate-adr.py"
  push:
    branches: [main]
    paths:
      - "architecture-decision-log/**"
      - "examples/**"
      - "schemas/**"
      - "scripts/validate-adr.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema pyyaml

      - name: Validate ADL
        run: |
          if [ -d "architecture-decision-log" ] && [ "$(ls -A architecture-decision-log/*.yaml 2>/dev/null)" ]; then
            python3 scripts/validate-adr.py architecture-decision-log/
          else
            echo "No ADR files in architecture-decision-log/ — skipping validation"
          fi

      - name: Validate examples/
        run: |
          if [ -d "examples" ] && [ "$(ls -A examples/*.yaml 2>/dev/null)" ]; then
            python3 scripts/validate-adr.py examples/
          else
            echo "No ADR files in examples/ — skipping validation"
          fi

      - name: YAML lint (ADL)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: architecture-decision-log/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 300
              truthy:
                check-keys: false
        if: hashFiles('architecture-decision-log/*.yaml') != ''

      - name: YAML lint (examples)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: examples/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 300
              truthy:
                check-keys: false
        if: hashFiles('examples/*.yaml') != ''

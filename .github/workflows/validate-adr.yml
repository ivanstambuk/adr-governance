name: Validate ADR

on:
  pull_request:
  pull_request_review:
    types: [submitted]
  merge_group: # Required for GitHub merge queue — sequential numbering check
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git diff in verify-approvals

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Repository integrity checks
        run: bash scripts/check-repo-integrity.sh

      - name: Validate ADR sources
        run: bash scripts/run-validation.sh

      - name: YAML lint (ADL)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: architecture-decision-log/
          config_file: .yamllint.yml
        if: hashFiles('architecture-decision-log/*.yaml') != ''

      - name: YAML lint (examples-reference)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: examples-reference/
          config_file: .yamllint.yml
        if: hashFiles('examples-reference/*.yaml') != ''

      - name: Verify approval identities
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review' || github.event_name == 'merge_group'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/verify-approvals.py

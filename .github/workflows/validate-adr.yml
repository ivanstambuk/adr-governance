name: Validate ADR

on:
  pull_request:
    paths:
      - "architecture-decision-log/**"
      - "examples-reference/**"
      - "schemas/**"
      - "scripts/validate-adr.py"
      - "scripts/verify-approvals.py"
  pull_request_review:
    types: [submitted]
  push:
    branches: [main]
    paths:
      - "architecture-decision-log/**"
      - "examples-reference/**"
      - "schemas/**"
      - "scripts/validate-adr.py"
      - "scripts/verify-approvals.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git diff in verify-approvals

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema pyyaml yamllint

      - name: Validate ADL
        run: |
          if [ -d "architecture-decision-log" ] && [ "$(ls -A architecture-decision-log/*.yaml 2>/dev/null)" ]; then
            python3 scripts/validate-adr.py architecture-decision-log/
          else
            echo "No ADR files in architecture-decision-log/ — skipping validation"
          fi

      - name: Validate examples-reference/
        run: |
          if [ -d "examples-reference" ] && [ "$(ls -A examples-reference/*.yaml 2>/dev/null)" ]; then
            python3 scripts/validate-adr.py examples-reference/
          else
            echo "No ADR files in examples-reference/ — skipping validation"
          fi

      - name: YAML lint (ADL)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: architecture-decision-log/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 300
              truthy:
                check-keys: false
        if: hashFiles('architecture-decision-log/*.yaml') != ''

      - name: YAML lint (examples-reference)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: examples-reference/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 300
              truthy:
                check-keys: false
        if: hashFiles('examples-reference/*.yaml') != ''

      - name: Verify approval identities
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/verify-approvals.py

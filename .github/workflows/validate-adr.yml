name: Validate ADR

on:
  pull_request:
    paths:
      - "decisions/**"
      - "schemas/**"
  push:
    branches: [main]
    paths:
      - "decisions/**"
      - "schemas/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema pyyaml

      - name: Validate ADRs
        run: |
          if [ -d "decisions" ] && [ "$(ls -A decisions/*.yaml 2>/dev/null)" ]; then
            python3 scripts/validate-adr.py decisions/
          else
            echo "No ADR files in decisions/ — skipping validation"
          fi

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: decisions/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                check-keys: false
        if: hashFiles('decisions/*.yaml') != ''

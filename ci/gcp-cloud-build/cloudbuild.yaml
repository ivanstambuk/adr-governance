# GCP Cloud Build — ADR Validation
#
# HOW TO USE:
#   1. Copy this file to the root of your repository as `cloudbuild.yaml`,
#      or keep it here and reference it via the trigger configuration.
#   2. In Google Cloud Console → Cloud Build → Triggers → Create Trigger:
#      - Event: Pull Request (for GitHub/GitLab repos) or Push to branch
#      - Source: your repository
#      - Configuration: Cloud Build configuration file → path to this file
#   3. For PR merge gating with GitHub:
#      - Install the Cloud Build GitHub App on your repo
#      - The build status is reported back as a GitHub Check
#      - Enable "Require status checks to pass" in GitHub branch protection
#   4. For Cloud Source Repositories:
#      - Create a trigger with event type "Push to a branch" matching ^main$
#      - PR-based triggers require mirroring to GitHub or using Secure Source Manager
#
# WHAT IT DOES:
#   - Validates all ADR YAML files against the JSON Schema
#   - Runs semantic checks (chosen_alternative consistency, audit_trail
#     ordering, lifecycle symmetry, etc.)
#   - Lints YAML for formatting issues
#   - Fails the build (and blocks the PR) if any validation errors are found

steps:
  # Step 1: Install Python dependencies
  - name: "python:3.12-slim"
    id: "install-deps"
    entrypoint: "pip"
    args: ["install", "--user", "-r", "requirements.txt"]

  # Step 2: Validate architecture-decision-log/
  - name: "python:3.12-slim"
    id: "validate-adl"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="$$HOME/.local/bin:$$PATH"
        if [ -d "architecture-decision-log" ] && ls architecture-decision-log/*.yaml 1>/dev/null 2>&1; then
          python3 scripts/validate-adr.py architecture-decision-log/
        else
          echo "No ADR files in architecture-decision-log/ — skipping validation"
        fi

  # Step 3: Validate examples-reference/
  - name: "python:3.12-slim"
    id: "validate-examples"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="$$HOME/.local/bin:$$PATH"
        if [ -d "examples-reference" ] && ls examples-reference/*.yaml 1>/dev/null 2>&1; then
          python3 scripts/validate-adr.py examples-reference/
        else
          echo "No ADR files in examples-reference/ — skipping validation"
        fi

  # Step 4: YAML lint
  - name: "python:3.12-slim"
    id: "yaml-lint"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="$$HOME/.local/bin:$$PATH"

        echo "=== Linting architecture-decision-log/ ==="
        if [ -d "architecture-decision-log" ] && ls architecture-decision-log/*.yaml 1>/dev/null 2>&1; then
          yamllint -c .yamllint.yml architecture-decision-log/
        else
          echo "No YAML files — skipping"
        fi

        echo "=== Linting examples-reference/ ==="
        if [ -d "examples-reference" ] && ls examples-reference/*.yaml 1>/dev/null 2>&1; then
          yamllint -c .yamllint.yml examples-reference/
        else
          echo "No YAML files — skipping"
        fi

  # Step 5: Verify approval identities
  # Note: GCP Cloud Build does not natively manage PR approvals.
  # If your source is GitHub, set GITHUB_TOKEN as a substitution variable
  # and the script will query the GitHub API.
  - name: "python:3.12-slim"
    id: "verify-approvals"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export PATH="$$HOME/.local/bin:$$PATH"
        echo "=== Verifying approval identities ==="
        python3 scripts/verify-approvals.py --dry-run

options:
  logging: CLOUD_LOGGING_ONLY

# AWS CodeBuild — ADR Validation
#
# HOW TO USE:
#   1. Copy this file to the root of your repository as `buildspec.yml`,
#      or keep it here and reference it via the CodeBuild project configuration.
#   2. Create a CodeBuild project:
#      AWS Console → CodeBuild → Create build project:
#      - Source: GitHub (connect via OAuth or Codestar Connections)
#      - Environment: Managed image → Ubuntu → Standard → latest
#      - Buildspec: "Use a buildspec file" → path to this file
#   3. For PR merge gating with GitHub:
#      - Enable "Build for pull requests" in the source settings
#      - Check "Report build statuses to source provider when your builds
#        start and finish"
#      - In GitHub: Settings → Branches → Branch Protection → enable
#        "Require status checks to pass" → select the CodeBuild check
#   4. For AWS CodeCommit:
#      - Create an EventBridge rule to trigger CodeBuild on
#        `pullRequestCreated` and `pullRequestSourceBranchUpdated` events
#      - Use CodePipeline with an approval action for merge gating
#
# WHAT IT DOES:
#   - Validates all ADR YAML files against the JSON Schema
#   - Runs semantic checks (chosen_alternative consistency, audit_trail
#     ordering, lifecycle symmetry, etc.)
#   - Lints YAML for formatting issues
#   - Fails the build (and blocks the PR) if any validation errors are found

version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install -r requirements.txt

  build:
    commands:
      # Repository integrity checks
      - |
        echo "=== Repository integrity checks ==="
        bash scripts/check-repo-integrity.sh

      # Validate ADR sources
      - |
        bash scripts/run-validation.sh

  post_build:
    commands:
      # YAML lint
      - |
        echo "=== Linting architecture-decision-log/ ==="
        if [ -d "architecture-decision-log" ] && ls architecture-decision-log/*.yaml 1>/dev/null 2>&1; then
          yamllint -c .yamllint.yml architecture-decision-log/
        else
          echo "No YAML files — skipping"
        fi

        echo "=== Linting examples-reference/ ==="
        if [ -d "examples-reference" ] && ls examples-reference/*.yaml 1>/dev/null 2>&1; then
          yamllint -c .yamllint.yml examples-reference/
        else
          echo "No YAML files — skipping"
        fi

      # Verify approval identities
      # Note: AWS CodeBuild does not natively manage PR approvals.
      # The shipped template therefore uses --dry-run. Full approval-identity
      # verification requires a custom integration that passes GitHub PR
      # metadata explicitly (for example: --platform github --repo owner/repo
      # --pr 42) alongside a GitHub token.
      - |
        echo "=== Verifying approval identities ==="
        python3 scripts/verify-approvals.py --dry-run

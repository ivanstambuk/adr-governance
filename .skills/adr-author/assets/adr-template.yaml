# ADR Template
# Copy this file and fill in all sections.
# Required sections are marked. Optional sections can be removed if not applicable.
# A `draft` ADR is still expected to be schema-valid and substantially complete;
# `draft` means author-owned and not yet proposed, not a half-filled scratch file.

# --- REQUIRED ---
adr:
  id: "ADR-NNNN-short-kebab-case-title" # Replace with next sequential ID + slug
  title: "" # 10-200 characters
  summary: "" # Optional: 2-4 sentence elevator pitch (max 500 chars)
  status: "draft" # draft | proposed | accepted | superseded | deprecated | rejected | deferred; use draft for complete-but-not-yet-proposed ADRs
  created_at: "" # ISO 8601 datetime
  last_modified: "" # ISO 8601 datetime
  version: "0.1"
  schema_version: "1.0.0"
  project: ""
  component: "" # Optional: specific component affected
  tags: [] # Categorization tags
  priority: "medium" # low | medium | high | critical
  decision_type: "technology" # technology | process | organizational | vendor | security | compliance
  decision_level: "" # Optional: strategic | tactical | operational — architectural altitude (see glossary)

# --- REQUIRED ---
authors:
  - name: ""
    role: ""
    email: ""

# --- REQUIRED ---
decision_owner:
  name: ""
  role: ""
  email: ""

# --- Optional ---
reviewers:
  - name: ""
    role: ""
    email: ""

# --- Optional while status is draft; required when status becomes proposed or accepted ---
approvals:
  - name: ""
    role: ""
    identity: "" # Required for proposed/accepted ADRs; platform handle for CI verification
    approved_at: null # ISO 8601 datetime when approved, null if pending
    signature_id: null

# --- REQUIRED ---
context:
  summary: >
    Describe the problem, the current state, and why a decision is needed.
  business_drivers:
    - ""
  technical_drivers:
    - ""
  constraints:
    - ""
  assumptions:
    - ""

# --- Optional ---
architecturally_significant_requirements:
  functional:
    - id: "F-001"
      description: ""
  non_functional:
    - id: "NF-001"
      description: ""

# --- REQUIRED: minimum 2 alternatives ---
# Each alternative needs a thorough description — NOT a brief summary.
# Write multiple paragraphs explaining the architectural design, data flows,
# and integration points. Embedding Mermaid diagrams is strongly encouraged.
alternatives:
  - name: ""
    description:
      | # Markdown — thorough architectural description. Embed Mermaid diagrams.
    pros:
      - ""
    cons:
      - ""
    estimated_cost: "medium" # low | medium | high
    risk: "medium" # low | medium | high | critical

  - name: ""
    description:
      | # Markdown — thorough architectural description. Embed Mermaid diagrams.
    pros:
      - ""
    cons:
      - ""
    estimated_cost: "medium"
    risk: "medium"

# --- REQUIRED ---
decision:
  chosen_alternative: "" # Must match a name in alternatives
  rationale:
    | # Markdown — explain why this alternative was chosen. Supports mermaid diagrams.
    Why this was chosen...
  tradeoffs: | # Markdown — acknowledged tradeoffs accepted with this decision.
    What we're giving up...
  decision_date: "" # ISO 8601 date (YYYY-MM-DD)
  confidence: "medium" # low | medium | high — low-confidence decisions get shorter review cycles

# --- REQUIRED ---
consequences:
  positive:
    - ""
  negative:
    - ""

# --- REQUIRED (artifact_ids can be added later) ---
confirmation:
  description: "" # How the implementation of this decision will be verified
  artifact_ids: [] # Jira tickets, PR URLs, test suite IDs, PoC results, benchmarks

# --- Optional ---
dependencies:
  internal: []
  external: []

# --- Optional ---
references:
  - title: ""
    url: ""

# --- Optional ---
lifecycle:
  review_cycle_months: 12 # Optional advisory metadata; scheduling/reminders are external to this repo
  next_review_date: "" # ISO 8601 date; tracked here, not automatically scheduled/enforced by this repo
  superseded_by: null
  supersedes: null
  archival:
    archived_at: null
    archive_reason: null

# --- Strongly recommended: append-only (schema: optional, but expected for all non-draft ADRs) ---
audit_trail:
  - event: "created"
    by: ""
    at: "" # ISO 8601 datetime

adr:
  id: ADR-0000-fixture-decision
  title: Use Widget over Gadget for internal processing
  y_statement: >-
    **In the context of** the internal processing pipeline, **facing** the need
    for a reliable and maintainable processing component, **we decided for**
    Widget **and neglected** Gadget and a hybrid Widget/Gadget approach,
    **to achieve** a single, well-tested processing path that simplifies
    debugging and reduces operational overhead, **accepting** slightly higher
    per-unit cost and limited vendor flexibility, **because** Widget is the
    only component that meets all three reliability, maintainability, and
    latency requirements without infrastructure modifications.
  status: accepted
  created_at: "2026-01-10T09:00:00Z"
  last_modified: "2026-01-25T14:30:00Z"
  version: "1.0"
  schema_version: "1.0.0"
  project: Internal Processing Pipeline
  component: Processing Engine
  tags:
    - processing
    - widget
    - reliability
  priority: high
  decision_type: technology
  decision_level: operational

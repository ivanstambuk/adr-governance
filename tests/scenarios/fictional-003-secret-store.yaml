scenario:
  id: fictional-003
  category: fictional
  title: "Centralized Secret Management Solution"
  difficulty: easy

persona:
  name: "Jordan Kim"
  role: "DevOps/Platform Engineer"
  style: "detailed, cooperative, provides concrete numbers and comparisons, technically thorough"
  knowledge_level: senior

project:
  name: "Meridian Healthcare SaaS"
  domain: "Healthcare / HIPAA-regulated"
  team_size: 25
  tech_stack: ["Python", "Django", "PostgreSQL", "Terraform", "AWS EKS"]

decision_context:
  problem: |
    We currently store secrets (API keys, database credentials, TLS certs)
    in environment variables and .env files committed to private repos.
    This is a HIPAA violation risk, secrets have leaked twice in the last
    year through CI logs, and we have no rotation policy. The security
    audit flagged this as a critical finding. We need a centralized secret
    management solution that supports automatic rotation, fine-grained
    access control, and audit logging.
  expected_decision_type: vendor
  expected_decision_level: tactical
  expected_alternatives:
    - "HashiCorp Vault (self-hosted)"
    - "AWS Secrets Manager + Parameter Store"
    - "CyberArk Conjur"
  ground_truth_notes: |
    This is a vendor/technology decision with strong compliance drivers.
    A good ADR should capture HIPAA requirements explicitly as ASRs,
    evaluate each option against audit logging, rotation, and access
    control requirements, and consider the operational burden of self-hosted
    vs managed. Vault is most flexible but requires dedicated ops team.
    AWS Secrets Manager is simplest since they're already on AWS but creates
    cloud lock-in. CyberArk Conjur is enterprise-grade but expensive and
    heavy. The decision should be grounded in the team's operational
    capacity (25-person team) and the regulatory urgency.

user_behavior:
  initial_message: |
    I need to create an ADR for adopting a centralized secret management
    solution. We had two secret leaks in the past year and our security
    audit flagged our current .env file approach as a critical HIPAA
    violation. We need to fix this ASAP.
  answer_style: |
    Be cooperative and thorough. Provide concrete details when asked:
    specific costs you've researched, team size constraints, compliance
    requirements from the audit report. Volunteer relevant context like
    "we're already on AWS" or "we only have 2 people with ops experience."
    When asked about alternatives, proactively suggest all three you've
    evaluated with preliminary pros/cons for each. Respond using numbered
    format matching the interviewer's questions. Give detailed 3-5 sentence
    answers.
  evasion_points: []

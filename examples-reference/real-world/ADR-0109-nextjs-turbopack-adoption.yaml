audit_trail:
  - event: created
    by: Tobias Koppers
    at: "2022-10-25T00:00:00Z"
    details: >
      Turbopack announced at Next.js Conf 2022 as an alpha bundler integrated
      with Next.js 13. Vercel claimed Turbopack was "up to 700x faster than
      Webpack" and "10x faster than Vite" for large applications. Tobias
      Koppers (Webpack's original creator, who joined Vercel in 2021)
      presented the architectural rationale: function-level incremental
      memoization, unified multi-environment module graph, and native Rust
      parallelization.
  - event: updated
    by: Vercel Engineering
    at: "2022-11-15T00:00:00Z"
    details: >
      Evan You (Vite/Vue.js creator) publicly challenged Turbopack's
      benchmark claims, demonstrating that Vite was benchmarked without SWC
      optimization enabled and that rounding artifacts exaggerated the
      performance gap (15ms rounded to 0.01s vs 87ms rounded to 0.09s,
      making a 6x difference appear as 10x). Vercel revised its benchmark
      methodology and shifted to more conservative, application-specific
      performance claims.
  - event: updated
    by: Next.js Core Team
    at: "2024-04-01T00:00:00Z"
    details: >
      Next.js 14.2 released with 99.8% of development tests passing on
      Turbopack, reaching 100% shortly after. The team had focused
      exclusively on the development experience (next dev) based on
      community feedback, deferring production builds to ensure maximum
      stability for the most impactful use case.
  - event: approved
    by: Vercel Engineering
    at: "2024-10-21T00:00:00Z"
    details: >
      Next.js 15 released with Turbopack development mode declared stable.
      All 6,599 development tests passing. Performance measurements on
      vercel.com showed 76.7% faster server startup, 96.3% faster Fast
      Refresh, and 45.8% faster initial route compilation. Turbopack
      activated via next dev --turbo flag. Webpack remained available as
      fallback for projects with incompatible plugins.
  - event: updated
    by: Next.js Core Team
    at: "2025-10-01T00:00:00Z"
    details: >
      Next.js 16 released with Turbopack stable for both development and
      production builds. Turbopack became the default bundler for all new
      Next.js projects. Performance improvements included 2-5x faster
      production builds and up to 10x faster Fast Refresh. File system
      caching stabilized in Next.js 16.1 (December 2025), enabling
      persistent caching across dev server restarts. Standalone Turbopack
      and plugin API planned for 2026.

dependencies:
  internal:
    - >-
      Next.js Framework — Turbopack is tightly integrated with Next.js's
      routing, rendering, and configuration systems, including App Router,
      Pages Router, and React Server Components
    - >-
      SWC Compiler — Next.js's Rust-based JavaScript/TypeScript compiler
      that handles transformation; Turbopack builds on the same Rust
      tooling infrastructure
    - >-
      Vercel Platform — Turbopack's production build output must be
      compatible with Vercel's deployment infrastructure and edge runtime
  external:
    - >-
      React — Turbopack must support React Server Components, Server
      Functions, and the evolving React rendering model, with the unified
      module graph designed specifically for RSC boundaries
    - >-
      npm ecosystem — Turbopack must correctly resolve and bundle packages
      from npm, handling CommonJS/ESM interop, conditional exports, and
      the full module resolution algorithm
    - >-
      Webpack loader ecosystem — Turbopack's loader compatibility layer
      must support commonly used Webpack loaders to provide a migration
      path for existing projects

    by: Evan You
    at: "2024-03-01T00:00:00Z"
    details: >
      Rolldown development initiated as part of VoidZero's unified
      toolchain vision. Evan You identified that Vite's dual-bundler
      architecture (esbuild for dev, Rollup for prod) was creating
      growing dev/prod inconsistencies and performance ceilings.
      The decision was to build a new Rust-based bundler with
      Rollup-compatible plugin API rather than incrementally
      patching the existing architecture.
  - event: updated

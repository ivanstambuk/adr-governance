dependencies:
  internal:
    - >-
      Vite Core — the build tool framework that integrates Rolldown
      as its production bundler and dev-time transform engine
    - >-
      Vite Plugin API — the layer that exposes Rollup-compatible
      plugin hooks to JavaScript plugins via Rolldown's napi-rs
      bindings
    - >-
      Vite Dev Server — the development server that will transition
      from unbundled ESM serving to optional full-bundle mode
      powered by Rolldown
  external:
    - >-
      Rolldown — the Rust-based bundler developed by VoidZero Inc.
      that replaces both esbuild and Rollup in Vite's architecture
    - >-
      Oxc — the Rust-based JavaScript toolchain (parser, resolver,
      transformer, minifier, linter) that provides Rolldown's
      foundational processing capabilities
    - >-
      napi-rs — the Node.js native addon framework that bridges
      Rolldown's Rust core with JavaScript plugin execution
    - >-
      Framework integrations — React, Vue, Svelte, Solid, Astro,
      Nuxt, SvelteKit, Remix, and other frameworks that build on
      Vite's plugin API
    - >-
      rolldown-vite — temporary separate npm package for phased
      rollout, following Vite's major/minor version numbers with
      independent patch versions

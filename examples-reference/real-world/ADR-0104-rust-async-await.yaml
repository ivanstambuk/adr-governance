adr:
  id: ADR-0104-rust-async-await
  title: >-
    Adopt stackless coroutines with lazy futures and no built-in runtime for
    Rust async/await
  y_statement: >-
    **In the context of** Rust's asynchronous programming design, **facing**
    the need for ergonomic concurrent I/O without sacrificing zero-cost
    abstractions or FFI compatibility, **we decided for** stackless
    coroutines compiled to state machines with lazy poll-based evaluation,
    postfix .await syntax, and no built-in runtime, **and neglected** green
    threads with a built-in runtime, eager futures evaluation, a generalized
    effects system, and continuing with callback-based combinators only,
    **to achieve** zero-cost async where the compiler generates optimal
    state machines with no hidden allocations, full FFI compatibility, and
    runtime-agnostic design from embedded to cloud, **accepting** Pin/Unpin
    complexity for self-referential futures, the function coloring problem,
    and ecosystem fragmentation across competing runtimes, **because**
    stackless coroutines were the only approach preserving Rust's core
    guarantees of zero-cost abstractions, no mandatory runtime, and safe FFI
    interoperability.
  status: accepted
  created_at: "2018-05-07T00:00:00Z"
  last_modified: "2019-11-07T00:00:00Z"
  version: "1.0"
  schema_version: "1.0.0"
  project: Rust
  component: Language / Async Runtime Model
  tags:
    - async-await
    - concurrency
    - stackless-coroutines
    - futures
    - zero-cost-abstractions
    - language-design
    - runtime-agnostic
  priority: critical
  decision_type: technology
  decision_level: strategic

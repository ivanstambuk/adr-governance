adr:
  id: ADR-0112-container-base-image-selection
  title: >-
    Adopt a Distroless-first container base image strategy, using
    Debian-slim for debuggability-critical workloads and Alpine
    only for statically compiled binaries
  y_statement: >-
    **In the context of** containerized production deployments,
    **facing** the fundamental tradeoff between image size, security
    surface area, libc compatibility, and runtime debuggability when
    selecting container base images, **we decided for** a
    Distroless-first strategy — defaulting to Google Distroless (or
    Chainguard equivalents) for production, with Debian-slim for
    workloads requiring interactive debugging and Alpine only for
    statically compiled binaries — **and neglected** a single
    universal base image, Ubuntu-based images, and scratch-only
    images — **to achieve** minimal CVE exposure, glibc compatibility
    for Python/Node.js/Java workloads, and a clear per-workload
    selection rubric, **accepting** the inability to interactively
    debug Distroless containers without ephemeral containers and
    maintaining three base image variants, **because** no single
    base image optimally serves all workload profiles, and a
    tiered strategy explicitly encodes the security-debuggability
    tradeoff into the deployment architecture.
  status: accepted
  created_at: "2020-06-01T00:00:00Z"
  last_modified: "2025-12-15T00:00:00Z"
  version: "2.0"
  schema_version: "1.0.0"
  project: Cross-cutting / Container Infrastructure
  component: Container Base Images / Runtime Environment
  tags:
    - containers
    - docker
    - base-image
    - alpine
    - debian-slim
    - distroless
    - chainguard
    - security
    - musl
    - glibc
    - cve
    - supply-chain
  priority: high
  decision_type: security
  decision_level: operational

context:
  description: |
    Every containerized application requires a base image — the
    foundational layer that provides the operating system libraries,
    runtime dependencies, and system tools upon which the application
    runs. This seemingly simple operational choice carries profound
    implications for security posture, compatibility, image size,
    build performance, and production debuggability.

    ```mermaid
    graph TD
        subgraph "The Container Base Image Tradeoff Triangle"
          A{Which base image?} --> B["Alpine Linux<br/>~5 MB, musl libc"]
          A --> C["Debian-slim<br/>~75 MB, glibc"]
          A --> D["Google Distroless<br/>~2–30 MB, no shell"]
          A --> E["Chainguard Images<br/>~10–30 MB, glibc + apk"]
        end

        subgraph "Security Surface"
          B --> F["✅ Small surface<br/>~30 packages"]
          C --> G["⚠️ Moderate surface<br/>~100+ packages"]
          D --> H["✅ Minimal surface<br/>~15 packages, no shell"]
          E --> I["✅ Zero CVE target<br/>daily rebuilds"]
        end

        subgraph "Compatibility"
          B --> J["❌ musl libc:<br/>Python wheels fail,<br/>DNS quirks"]
          C --> K["✅ glibc: universal<br/>compatibility"]
          D --> L["✅ glibc (Debian-based)"]
          E --> M["✅ glibc (Wolfi-based)"]
        end

        subgraph "Debuggability"
          B --> N["✅ Shell + apk"]
          C --> O["✅ Shell + apt"]
          D --> P["❌ No shell,<br/>no package manager"]
          E --> Q["⚠️ -dev variants<br/>only"]
        end

        style F fill:#2d8,stroke:#333,color:#000
        style H fill:#2d8,stroke:#333,color:#000
        style I fill:#2d8,stroke:#333,color:#000
        style K fill:#2d8,stroke:#333,color:#000
        style L fill:#2d8,stroke:#333,color:#000
        style M fill:#2d8,stroke:#333,color:#000
        style N fill:#2d8,stroke:#333,color:#000
        style O fill:#2d8,stroke:#333,color:#000
        style J fill:#f66,stroke:#333,color:#000
        style G fill:#fa0,stroke:#333,color:#000
        style P fill:#f66,stroke:#333,color:#000
        style Q fill:#fa0,stroke:#333,color:#000
    ```

    **1. The security imperative — CVE counts directly correlate
    with base image contents:**

    Container vulnerability scanners (Trivy, Grype, Snyk) report
    CVEs based on every installed package in the image. A typical
    `python:3.12` image based on full Debian contains 300+
    packages and routinely reports 100–500 CVEs. Switching to
    `python:3.12-slim` reduces this to ~100 packages and ~50–150
    CVEs. Using Distroless or Chainguard images reduces the count
    to near-zero for the base layer. The practical impact is
    enormous: security teams waste hundreds of hours triaging
    CVEs in packages the application never uses.

    | Base Image | Approx. Size | Packages | Typical CVEs | Shell |
    |------------|-------------:|---------:|-------------:|:-----:|
    | `debian:12` (full) | ~140 MB | 300+ | 200–500 | ✅ |
    | `debian:12-slim` | ~75 MB | 100+ | 50–150 | ✅ |
    | `alpine:3.20` | ~5 MB | ~30 | 5–20 | ✅ |
    | `gcr.io/distroless/base-debian12` | ~30 MB | ~15 | 0–5 | ❌ |
    | `gcr.io/distroless/static-debian12` | ~2 MB | ~5 | 0 | ❌ |
    | `cgr.dev/chainguard/python` | ~50 MB | ~40 | 0 | ❌ |

    **2. The musl vs. glibc compatibility problem:**

    Alpine Linux uses `musl libc` instead of the `glibc` used by
    Debian, Ubuntu, and virtually all mainstream Linux distributions.
    This difference causes real-world breakage:

    - **Python wheels**: The `manylinux` wheel standard assumes
      glibc. On Alpine, `pip install` falls back to compiling from
      source, requiring `gcc`, `make`, and header packages —
      negating Alpine's size advantage and increasing build times
      by 5–10x for packages like `numpy`, `pandas`, or `cryptography`.

    - **Node.js native addons**: Packages like `bcrypt`, `sharp`,
      `canvas`, and `grpc` ship pre-built binaries for glibc but
      often lack musl builds. Installation triggers `node-gyp`
      compilation with all its associated fragility.

    - **DNS resolution quirks**: musl's DNS resolver parallelizes A
      and AAAA queries and accepts the first response. In split-
      horizon DNS (common in Kubernetes), if an NXDOMAIN arrives
      before the valid record, resolution silently fails — causing
      intermittent "Unknown Host" errors that are extremely difficult
      to diagnose.

    - **Thread stack size**: musl defaults to 128 KB thread stacks
      versus glibc's 2–10 MB. Multi-threaded Python, Java, and C++
      applications can segfault on Alpine without explicit stack
      size configuration.

    **3. The debuggability vs. security surface tradeoff:**

    Distroless images achieve their security advantage precisely
    by removing the tools that operators need for debugging: no
    shell, no `curl`, no `strace`, no package manager. When a
    production incident requires inspecting a running container,
    Distroless users must rely on Kubernetes ephemeral containers
    (`kubectl debug`) or external observability tooling. This
    works in mature Kubernetes environments but fails in Docker
    Compose or ECS deployments where ephemeral containers are
    unavailable.

    **4. The Chainguard/Wolfi disruption (2022–present):**

    Chainguard's Wolfi-based images offer a "best of both worlds"
    proposition: glibc compatibility, apk package management, zero
    known CVEs through daily rebuilds and aggressive patching, plus
    SBOM inclusion and SLSA Build Level 3 provenance. However, the
    production images follow the Distroless philosophy (no shell),
    with `-dev` variants providing build-time tools. Chainguard's
    approach validates the core insight: minimalism and security
    do not require musl libc.
  business_drivers:
    - >-
      Security compliance mandates (SOC 2, FedRAMP, PCI-DSS) require
      demonstrably minimal CVE counts in production container images,
      making base image selection a compliance-critical decision
    - >-
      Container scanning noise from hundreds of irrelevant CVEs in
      bloated base images consumes security engineering hours that
      should be spent on application-level vulnerabilities
    - >-
      Supply chain security incidents (SolarWinds, Log4Shell, xz-utils)
      have elevated base image provenance from operational concern
      to board-level risk, driving adoption of SBOM and attestation
  technical_drivers:
    - >-
      musl libc compatibility issues cause Python wheel compilation
      failures, Node.js native addon breakage, and DNS resolution
      anomalies on Alpine — forcing teams to choose between image
      size and application compatibility
    - >-
      Distroless images eliminate interactive debugging but reduce
      the attack surface to the application runtime only — the
      absence of a shell is simultaneously the strongest security
      feature and the biggest operational impediment
    - >-
      Multi-stage Docker builds enable using fat build images with
      toolchains while producing minimal runtime images, decoupling
      build-time needs from runtime security constraints
  constraints:
    - >-
      Must support Python, Node.js, Java, and Go workloads — each
      has different libc compatibility requirements and native
      dependency expectations
    - >-
      Must work in both Kubernetes and non-Kubernetes environments —
      ephemeral container debugging (the Distroless workaround) is
      only available in Kubernetes 1.25+
    - >-
      Must integrate with existing CI/CD pipelines and container
      scanning tools (Trivy, Grype, Snyk) without requiring
      scanner-specific base image exceptions
    - >-
      Must not increase container build times by more than 2x
      compared to current Debian-based images
  assumptions:
    - >-
      Multi-stage Docker builds are the standard practice — teams
      already separate build-time dependencies from runtime images,
      making the transition to minimal runtime images incremental
    - >-
      Kubernetes ephemeral containers are available for production
      debugging where Distroless images are used, and teams have
      SRE processes for debugging without shell access
    - >-
      Container scanning is part of every CI/CD pipeline — the
      CVE reduction benefit of minimal images is immediately
      visible and measurable in existing tooling
architecturally_significant_requirements:
  functional:
    - id: F-001
      description: >
        The base image strategy must support language-specific
        runtime images for Python 3.x, Node.js 20+, Java 21+,
        and Go 1.22+ — each with appropriate libc, runtime
        libraries, and certificate bundles.
    - id: F-002
      description: >
        Production images must be buildable via multi-stage
        Dockerfiles where build stages use full toolchain images
        and final stages use minimal runtime images with only
        application binaries and dependencies.
    - id: F-003
      description: >
        A documented selection rubric must map workload
        characteristics (language runtime, debugging needs,
        compliance tier) to the appropriate base image tier
        — Distroless, Debian-slim, or Alpine.
  non_functional:
    - id: NF-001
      description: >
        Production runtime images must report zero critical and
        zero high CVEs in the base layer when scanned with Trivy
        or Grype — all reported CVEs must originate from
        application dependencies, not the operating system.
    - id: NF-002
      description: >
        Container images must include a verifiable Software Bill
        of Materials (SBOM) and support attestation verification
        via cosign or equivalent supply chain security tooling.
    - id: NF-003
      description: >
        Total image size for runtime containers must not exceed
        150 MB for interpreted language runtimes (Python, Node.js)
        and 50 MB for compiled binaries (Go, Rust) — ensuring
        fast pull times and reduced registry storage costs.
alternatives:
  - name: >-
      Distroless-first strategy — default to Google Distroless
      with Debian-slim fallback and Alpine for static binaries
    description: |
      Adopt a tiered base image strategy where the default
      production base image is Google Distroless (or Chainguard
      equivalent), with Debian-slim reserved for workloads that
      require interactive debugging, and Alpine used exclusively
      for statically compiled Go/Rust binaries where musl
      compatibility is irrelevant.

      The strategy is codified as a **selection rubric:**

      | Workload Type | Base Image | Rationale |
      |---------------|------------|-----------|
      | Go/Rust static binary | `gcr.io/distroless/static-debian12` | ~2 MB, zero OS deps |
      | Java application | `gcr.io/distroless/java21-debian12` | JRE only, no shell |
      | Python application | `cgr.dev/chainguard/python` or `gcr.io/distroless/python3-debian12` | glibc, zero CVEs |
      | Node.js application | `gcr.io/distroless/nodejs22-debian12` | V8 + glibc, no shell |
      | Debug-critical workload | `debian:12-slim` | Full shell + apt |
      | Alpine Go binary | `alpine:3.20` | Only if musl-tested |

      **Multi-stage build pattern:**

      ```dockerfile
      # Build stage — full toolchain available
      FROM python:3.12-slim AS builder
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir --target=/deps -r requirements.txt
      COPY . .

      # Runtime stage — Distroless, no shell
      FROM gcr.io/distroless/python3-debian12
      WORKDIR /app
      COPY --from=builder /deps /deps
      COPY --from=builder /app /app
      ENV PYTHONPATH=/deps
      CMD ["app.py"]
      ```

      ```mermaid
      graph TD
          subgraph "Build Stage"
            A["python:3.12-slim<br/>(full toolchain)"] --> B["pip install<br/>compile wheels"]
            B --> C["Application<br/>+ dependencies"]
          end

          subgraph "Runtime Stage"
            C --> D["COPY --from=builder"]
            D --> E["Distroless Python<br/>~50 MB, 0 CVEs"]
          end

          subgraph "Security Outcome"
            E --> F["✅ No shell"]
            E --> G["✅ No apt/apk"]
            E --> H["✅ glibc compatible"]
            E --> I["✅ 0 base-layer CVEs"]
          end

          subgraph "Debugging Path"
            E --> J{"Need debug?"}
            J -->|"K8s"| K["kubectl debug<br/>ephemeral container"]
            J -->|"Non-K8s"| L["❌ Rebuild with<br/>Debian-slim"]
          end

          style F fill:#2d8,stroke:#333,color:#000
          style G fill:#2d8,stroke:#333,color:#000
          style H fill:#2d8,stroke:#333,color:#000
          style I fill:#2d8,stroke:#333,color:#000
          style L fill:#f66,stroke:#333,color:#000
      ```

      **Chainguard as an alternative Distroless provider:**

      Chainguard Images, built on Wolfi OS, offer the same
      Distroless philosophy but with several advantages over
      Google's original Distroless project:

      | Feature | Google Distroless | Chainguard Images |
      |---------|:-----------------:|:-----------------:|
      | Build system | Bazel on Debian | apko on Wolfi |
      | C library | glibc (Debian) | glibc (Wolfi) |
      | Daily rebuilds | ❌ | ✅ |
      | SBOM included | ❌ | ✅ |
      | SLSA provenance | ❌ | ✅ Level 3 |
      | Zero CVE SLA | ❌ | ✅ (paid tier) |
      | Dev variants | ❌ | ✅ (-dev images) |
      | Free tier | ✅ (all images) | ✅ (latest tags) |

      **Evolution timeline:**

      | Date | Milestone | Significance |
      |------|-----------|--------------|
      | Apr 2017 | Google Distroless created | Matt Moore co-founds the project with initial commit |
      | 2018 | Language runtimes added | Python, Java, Node.js Distroless images available |
      | 2019 | Kubernetes adopts Distroless | K8s 1.15+ uses Distroless for system components |
      | 2020 | Distroless matures | Decision crystallizes as Distroless reaches production-grade |
      | Oct 2022 | Chainguard founded | Wolfi OS and Chainguard Images launched |
      | 2023 | Ephemeral containers GA | Kubernetes 1.25+ makes Distroless debugging viable |
      | May 2025 | Docker Hardened Images | Docker releases 1000+ distroless-style images for free |
      | Dec 2025 | DHI open-sourced | Docker makes hardened catalog Apache 2.0 licensed |
    pros:
      - >-
        Near-zero CVE base layers in production — Distroless and
        Chainguard images consistently report 0 critical and 0 high
        CVEs, eliminating triage noise from OS-level vulnerabilities
      - >-
        glibc compatibility preserved — unlike Alpine, Distroless
        and Chainguard use Debian/Wolfi glibc, ensuring Python wheels,
        Node.js native addons, and Java JNI libraries work correctly
      - >-
        Per-workload optimization — static Go binaries get 2 MB
        images, Java gets JRE-only images, debug-critical workloads
        retain full shell access via Debian-slim
      - >-
        Attack surface reduction through absence — no shell means
        no interactive exploitation path, no package manager means
        no post-compromise software installation
      - >-
        Ecosystem convergence — Google, Chainguard, and Docker all
        now offer Distroless-style images, validating the approach
        as the industry standard for production containers
    cons:
      - >-
        Cannot interactively debug Distroless containers without
        Kubernetes ephemeral containers — Docker Compose and ECS
        users must rebuild with Debian-slim to diagnose issues
      - >-
        Maintaining three base image tiers (Distroless, Debian-slim,
        Alpine) increases Dockerfile complexity and CI/CD matrix
        surface compared to a single universal base image
      - >-
        Chainguard's zero-CVE SLA requires a paid subscription —
        the free tier provides only latest tags without long-term
        support or vulnerability remediation guarantees
      - >-
        Multi-stage builds are mandatory — the build-runtime
        separation adds Dockerfile complexity and increases
        initial setup effort for teams without existing multi-stage
        experience
    estimated_cost: medium
    risk: low
  - name: >-
      Standardize on Debian-slim — universal glibc compatibility
      with moderate image size
    description: |
      Use `debian:12-slim` (or equivalent `*-slim` language images)
      as the single universal base image for all workloads. This
      approach prioritizes compatibility and operational simplicity
      over minimal image size or minimal CVE counts.

      Debian-slim images are produced by removing documentation,
      locale data, and non-essential packages from the full Debian
      distribution, resulting in images of approximately 75 MB.
      They retain the `apt` package manager, `bash` shell, and
      core GNU utilities, making them fully debuggable in
      production.

      ```dockerfile
      # Single-stage Debian-slim approach
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt
      COPY . .
      CMD ["python", "app.py"]
      ```

      ```mermaid
      graph TD
          A["debian:12-slim<br/>~75 MB, glibc"] --> B{Assessment}
          B --> C["✅ glibc: universal<br/>compatibility"]
          B --> D["✅ apt: install any<br/>Debian package"]
          B --> E["✅ bash: full<br/>interactive debugging"]
          B --> F["⚠️ ~75 MB: 15x<br/>larger than Alpine"]
          B --> G["❌ 50–150 CVEs<br/>in base layer"]
          B --> H["❌ Shell available<br/>to attackers"]

          style C fill:#2d8,stroke:#333,color:#000
          style D fill:#2d8,stroke:#333,color:#000
          style E fill:#2d8,stroke:#333,color:#000
          style F fill:#fa0,stroke:#333,color:#000
          style G fill:#f66,stroke:#333,color:#000
          style H fill:#f66,stroke:#333,color:#000
      ```

      **Why teams choose Debian-slim:**

      Many teams, after experimenting with Alpine (and encountering
      musl issues) or Distroless (and being unable to debug), return
      to Debian-slim as the pragmatic default. The reasoning is
      that in a Kubernetes cluster with hundreds of containers, the
      75 MB per-image overhead is negligible compared to application
      size, and the ability to `kubectl exec` into any container
      during an incident is operationally invaluable.

      | Consideration | Debian-slim | Alpine | Distroless |
      |---------------|:-----------:|:------:|:----------:|
      | glibc compat | ✅ | ❌ musl | ✅ |
      | Shell access | ✅ | ✅ | ❌ |
      | Package manager | ✅ apt | ✅ apk | ❌ |
      | Base CVEs | 50–150 | 5–20 | 0–5 |
      | Image size | ~75 MB | ~5 MB | ~2–30 MB |
      | Python wheels | ✅ | ⚠️ compile | ✅ |
      | DNS behavior | ✅ | ⚠️ quirks | ✅ |
    pros:
      - Universal glibc compatibility — every Python wheel, Node.js
        addon, and Java library works without modification or
        source compilation
      - Full interactive debugging — bash, apt, curl, strace all
        available natively in production containers for incident
        response
      - Operational simplicity — single base image for all workloads
        eliminates per-workload Dockerfile branching and CI/CD
        complexity
      - Mature security team — Debian's security team provides
        timely CVE patches with long-term support across release
        cycles
    cons:
      - >-
        50–150 base-layer CVEs in every security scan — the majority
        are in packages the application never uses, but they still
        require triage and documentation for compliance audits
      - >-
        Shell and package manager presence is an attack vector —
        a compromised container can use bash and apt to download
        additional tools, escalate privileges, or exfiltrate data
      - >-
        75 MB base image adds pull time and registry storage —
        while negligible per-container, it compounds across hundreds
        of microservices in large cluster deployments
      - >-
        No differentiation by workload security tier — a
        high-security payment service uses the same base image
        as a low-risk batch job, violating the principle of
        least privilege
    estimated_cost: low
    risk: medium
    rejection_rationale: >
      Debian-slim provides the best compatibility and debuggability
      but fails the security-first mandate for production workloads.
      Reporting 50–150 CVEs per base image creates unacceptable
      compliance overhead — security teams must triage every CVE
      to determine whether it is exploitable in the application's
      context. The presence of a shell and package manager in every
      production container violates the principle of least privilege
      and provides attackers with post-compromise tooling. However,
      Debian-slim is explicitly retained as the recommended base
      for debug-critical workloads where interactive shell access
      is a hard requirement, making this a partial rejection rather
      than a full exclusion.
  - name: >-
      Standardize on Alpine Linux — minimal image size with musl
      libc and apk package manager
    description: |
      Use Alpine Linux as the universal container base image for
      all workloads. Alpine's ~5 MB base image and security-focused
      design have made it the most popular minimal Linux distribution
      for containers since Docker's early adoption wave in 2014–2016.

      Alpine Linux uses `musl libc` instead of `glibc`, `BusyBox`
      for core utilities instead of GNU coreutils, and `apk`
      instead of `apt` for package management. This combination
      produces the smallest general-purpose Linux container image
      available.

      ```dockerfile
      # Alpine-based Python application
      FROM python:3.12-alpine
      WORKDIR /app

      # Required for many Python packages on Alpine
      RUN apk add --no-cache \
          gcc musl-dev libffi-dev openssl-dev \
          && pip install --no-cache-dir -r requirements.txt \
          && apk del gcc musl-dev libffi-dev

      COPY . .
      CMD ["python", "app.py"]
      ```

      ```mermaid
      graph TD
          A["alpine:3.20<br/>~5 MB, musl libc"] --> B{Language runtime?}
          B -->|"Go/Rust<br/>(static binary)"| C["✅ Perfect fit<br/>musl irrelevant"]
          B -->|"Python"| D["⚠️ Wheels fail<br/>compile from source"]
          B -->|"Node.js"| E["⚠️ Native addons<br/>may need rebuild"]
          B -->|"Java"| F["⚠️ JNI libraries<br/>may need glibc"]

          D --> G["❌ Install gcc,<br/>musl-dev, headers"]
          G --> H["❌ Image bloats<br/>to 200+ MB"]
          H --> I["❌ Negates Alpine's<br/>size advantage"]

          C --> J["✅ Final image<br/>~10 MB"]

          style C fill:#2d8,stroke:#333,color:#000
          style J fill:#2d8,stroke:#333,color:#000
          style D fill:#fa0,stroke:#333,color:#000
          style E fill:#fa0,stroke:#333,color:#000
          style F fill:#fa0,stroke:#333,color:#000
          style G fill:#f66,stroke:#333,color:#000
          style H fill:#f66,stroke:#333,color:#000
          style I fill:#f66,stroke:#333,color:#000
      ```

      **The musl compatibility problem in detail:**

      | Issue | Symptom | Root Cause |
      |-------|---------|------------|
      | Python `manylinux` wheels | `pip install` compiles from source | Wheels assume glibc; musl ABI incompatible |
      | Node.js `sharp` / `bcrypt` | `node-gyp` rebuild required | Pre-built binaries target glibc |
      | DNS split-horizon | Intermittent "Unknown Host" | musl resolver accepts first NXDOMAIN |
      | Thread stack overflow | Segfault in multi-threaded apps | musl default 128 KB vs glibc 2–10 MB |
      | `dlclose` behavior | Libraries never unloaded | musl treats `dlclose` as no-op |
      | Locale handling | Incorrect string sorting | musl lacks full locale support |

      Despite these issues, Alpine excels for one specific use
      case: statically compiled Go and Rust binaries. When the
      application is a single static binary with no dynamic
      library dependencies, musl vs. glibc is irrelevant, and
      Alpine's 5 MB base provides the smallest possible image
      with a working shell for debugging.
    pros:
      - Smallest general-purpose base image at ~5 MB — fastest pull
        times and minimal registry storage across large deployments
      - Rapid security patches — Alpine's community releases CVE
        fixes quickly, and the small package set means fewer total
        vulnerabilities to track
      - Shell and package manager available — apk enables installing
        debugging tools during incident response without rebuilding
      - Perfect fit for statically compiled binaries — Go and Rust
        applications benefit from Alpine's size without musl issues
    cons:
      - >-
        musl libc breaks Python wheels, Node.js native addons, and
        Java JNI libraries — falling back to source compilation
        negates Alpine's size advantage and increases build times
        by 5–10x
      - >-
        DNS resolution anomalies in Kubernetes — musl's resolver
        parallelization and NXDOMAIN handling causes intermittent
        service discovery failures in split-horizon DNS environments
      - >-
        Thread stack size mismatch — musl's 128 KB default versus
        glibc's 2–10 MB causes silent segfaults in multi-threaded
        Python and Java applications without explicit tuning
      - >-
        Adding build dependencies (gcc, musl-dev, headers) to
        compile native extensions bloats Alpine images to 200+ MB,
        completely negating the size advantage that motivated
        choosing Alpine
    estimated_cost: low
    risk: high
    rejection_rationale: >
      Alpine's musl libc creates a category of subtle, difficult-to-
      diagnose compatibility issues that affect the majority of
      real-world workloads. For Python applications, pip install
      failures on Alpine are the single most common container
      debugging question on Stack Overflow. For Node.js, native
      addon breakage forces teams to either maintain custom build
      scripts or abandon Alpine. The DNS resolution quirks in
      Kubernetes environments cause intermittent failures that are
      notoriously difficult to reproduce and diagnose. Alpine
      remains the recommended base image for statically compiled
      Go and Rust binaries — where musl compatibility is
      irrelevant — but it is rejected as a universal base image
      because the compatibility cost exceeds the size savings for
      interpreted language workloads.
  - name: >-
      Use scratch (empty) base image for all compiled workloads
    description: |
      Use Docker's `scratch` base image — a completely empty
      filesystem — as the base for all compiled application
      containers. This is the ultimate minimal approach: the
      container contains only the application binary and any files
      explicitly copied in.

      ```dockerfile
      # Scratch-based Go application
      FROM golang:1.22 AS builder
      WORKDIR /app
      COPY . .
      RUN CGO_ENABLED=0 GOOS=linux go build -o /server

      FROM scratch
      COPY --from=builder /server /server
      COPY --from=builder /etc/ssl/certs/ca-certificates.crt \
           /etc/ssl/certs/
      ENTRYPOINT ["/server"]
      ```

      ```mermaid
      graph TD
          A["scratch<br/>0 bytes"] --> B{Assessment}
          B --> C["✅ Absolute minimum<br/>image size"]
          B --> D["✅ Zero OS-level<br/>CVEs possible"]
          B --> E["❌ No libc at all"]
          B --> F["❌ No CA certs<br/>(must copy manually)"]
          B --> G["❌ No timezone data"]
          B --> H["❌ No /etc/passwd"]
          B --> I["❌ No debugging<br/>of any kind"]

          style C fill:#2d8,stroke:#333,color:#000
          style D fill:#2d8,stroke:#333,color:#000
          style E fill:#f66,stroke:#333,color:#000
          style F fill:#f66,stroke:#333,color:#000
          style G fill:#f66,stroke:#333,color:#000
          style H fill:#f66,stroke:#333,color:#000
          style I fill:#f66,stroke:#333,color:#000
      ```

      While theoretically the most secure option, `scratch`
      requires the application to be fully statically compiled
      (no dynamic linking) and the developer to manually copy
      every required file: CA certificates, timezone data,
      `/etc/passwd` for non-root users, and any configuration
      files. This makes it appropriate only for simple Go binaries
      and impractical for interpreted languages or applications
      with complex runtime dependencies.
    pros:
      - Absolute minimum image size — contains only the application
        binary, producing images as small as 5–15 MB for Go services
      - Zero OS-level attack surface — no operating system packages,
        libraries, or utilities exist to be exploited
      - Forces explicit dependency management — every file in the
        container is intentionally placed there by the developer
    cons:
      - >-
        Impossible for interpreted languages — Python, Node.js, Java,
        Ruby all require a runtime, libc, and supporting libraries
        that scratch cannot provide
      - >-
        Missing essential filesystem artifacts — CA certificates,
        timezone data, user entries, and DNS configuration must all
        be manually copied from the build stage
      - >-
        No debugging capability whatsoever — even Distroless
        provides basic process management, while scratch provides
        nothing beyond the kernel interface
      - >-
        CGO_ENABLED=0 required for Go — any Go application using
        CGO (database drivers, image processing) cannot use scratch
        without significant refactoring
    estimated_cost: low
    risk: high
    rejection_rationale: >
      scratch is too restrictive for a universal base image strategy.
      It works only for statically compiled applications with no
      dynamic dependencies, no CGO, and no runtime resource
      requirements — a narrow subset of real-world workloads.
      Distroless provides the same security benefit (no shell, no
      package manager) while including essential OS primitives
      (libc, CA certificates, timezone data, user management) that
      scratch lacks. For the specific case of CGO_ENABLED=0 Go
      binaries, Distroless static images are nearly as small as
      scratch (~2 MB vs. ~5 MB) while being more robust and
      maintainable.
  - name: >-
      Standardize on Ubuntu-based images for maximum ecosystem
      familiarity
    description: |
      Use Ubuntu (or Ubuntu-based official language images) as the
      universal base image for all containerized workloads. Ubuntu
      is the most widely used Linux distribution in cloud environments
      and provides the broadest ecosystem compatibility, package
      availability, and developer familiarity.

      ```mermaid
      graph TD
          A["ubuntu:24.04<br/>~75 MB, glibc"] --> B{Assessment}
          B --> C["✅ Maximum package<br/>availability via apt"]
          B --> D["✅ Most familiar to<br/>developers"]
          B --> E["✅ LTS with 10-year<br/>security support"]
          B --> F["❌ ~75 MB base:<br/>same as Debian-slim"]
          B --> G["❌ 100–200 CVEs<br/>in base layer"]
          B --> H["❌ Canonical-specific<br/>packages add divergence"]

          style C fill:#2d8,stroke:#333,color:#000
          style D fill:#2d8,stroke:#333,color:#000
          style E fill:#2d8,stroke:#333,color:#000
          style F fill:#fa0,stroke:#333,color:#000
          style G fill:#f66,stroke:#333,color:#000
          style H fill:#fa0,stroke:#333,color:#000
      ```

      Ubuntu offers similar size and compatibility to Debian-slim
      (since Ubuntu is derived from Debian) but adds Canonical's
      commercial support, Snap packages, and Ubuntu Pro security
      patching. However, for containers specifically, Ubuntu
      provides no meaningful advantage over Debian-slim while
      adding Canonical-specific packages and abstractions that
      increase the CVE surface.

      Microsoft has introduced "Ubuntu Chiseled" images following
      the Distroless philosophy — minimal Ubuntu images without
      shell or package manager, optimized for .NET workloads. This
      validates the Distroless approach but fragments the ecosystem
      further by adding another vendor-specific minimal image line.
    pros:
      - Maximum developer familiarity — Ubuntu is the most widely
        used Linux distribution, requiring zero learning curve for
        most teams
      - Broadest package ecosystem — apt repositories include
        virtually every library and tool a containerized application
        might need
      - Long-term support — Ubuntu LTS releases provide 5 years
        of standard support and 10 years with Ubuntu Pro
    cons:
      - >-
        No meaningful advantage over Debian-slim for containers —
        similar size, same glibc, same apt package manager, but
        with additional Canonical-specific packages that increase
        the CVE count
      - >-
        100–200 CVEs in base layer — Ubuntu includes more packages
        than Debian-slim by default, increasing the vulnerability
        surface without corresponding benefit
      - >-
        Snap and Ubuntu-specific tooling adds complexity in
        container environments where minimal images are preferred
        and Snap's daemon requirements conflict with container
        constraints
    estimated_cost: low
    risk: medium
    rejection_rationale: >
      Ubuntu provides no meaningful advantage over Debian-slim for
      containerized workloads. Both use glibc, both support apt,
      and both are approximately 75 MB. Ubuntu adds Canonical-
      specific packages (snapd, ubuntu-advantage-tools) that
      increase the CVE surface without adding value in container
      contexts. For teams that specifically need Canonical's
      commercial support or Ubuntu Pro security patching, Ubuntu
      remains a viable choice. But as a default base image strategy,
      Debian-slim provides the same compatibility with a smaller
      and more predictable package set. Microsoft's Ubuntu Chiseled
      images are an interesting development for .NET workloads but
      do not address the general-purpose base image question.
decision:
  chosen_alternative: >-
    Distroless-first strategy — default to Google Distroless
    with Debian-slim fallback and Alpine for static binaries
  rationale: |
    The Distroless-first strategy was chosen because it uniquely
    addresses the three competing requirements that no single
    base image satisfies on its own:

    1. **Security-first by default**: Distroless images eliminate
       the shell, package manager, and unnecessary OS utilities
       that represent the most exploitable components in a
       container. A compromised Distroless container provides an
       attacker with no interactive tools to escalate privileges,
       move laterally, or exfiltrate data. This is not a
       theoretical advantage — container escape techniques
       routinely depend on the availability of shell utilities
       (`curl`, `wget`, `nc`) in the compromised container.

    2. **glibc compatibility preserved**: Unlike Alpine's musl
       libc, Distroless images (based on Debian) and Chainguard
       images (based on Wolfi) use glibc. This eliminates the
       entire category of musl compatibility issues: Python
       `manylinux` wheel failures, Node.js native addon breakage,
       Java JNI incompatibilities, DNS resolution anomalies, and
       thread stack size mismatches. The team does not need to
       maintain per-language compatibility workarounds.

    3. **Per-workload optimization through tiering**: Rather than
       forcing all workloads into a single compromise, the tiered
       strategy assigns the most appropriate base image to each
       workload profile. Static Go/Rust binaries get the smallest
       possible images (~2 MB). Java and Python get glibc-based
       Distroless images with runtime-only packages. Debug-critical
       workloads (development environments, batch jobs with complex
       failure modes) retain full shell access via Debian-slim.

    4. **Industry convergence validates the approach**: Google uses
       Distroless for its own production containers. Kubernetes
       adopted Distroless for system components in v1.15+. Knative,
       Tekton, Istio, and Teleport use Distroless. Chainguard
       independently validated the same design philosophy with
       Wolfi-based images. Docker released 1000+ distroless-style
       hardened images in 2025. This convergence from multiple
       independent actors confirms that Distroless is the emerging
       industry standard, not a niche approach.

    5. **Ephemeral containers solve the debugging gap**: The
       primary objection to Distroless — the inability to debug
       interactively — is addressed by Kubernetes ephemeral
       containers (`kubectl debug`), which became generally
       available in Kubernetes 1.25. For the subset of workloads
       running outside Kubernetes where ephemeral containers are
       unavailable, Debian-slim provides the fallback.
  tradeoffs: |
    - **Debugging friction accepted for security gain** because
      the inability to `kubectl exec` into a Distroless container
      is precisely its strongest security property. Ephemeral
      containers provide equivalent debugging capability in
      Kubernetes environments, and the Debian-slim fallback tier
      serves workloads where this mitigation is insufficient.

    - **Three base image variants accepted** because maintaining
      Distroless, Debian-slim, and Alpine Dockerfiles is a
      manageable cost given that the selection is codified in a
      rubric, not left to individual developer preference. CI/CD
      templates standardize the multi-stage build pattern.

    - **Chainguard/Wolfi commercial dependency acknowledged**
      because the free tier provides sufficient coverage for most
      workloads, and Google Distroless remains a fully free
      alternative. The zero-CVE SLA from Chainguard's paid tier
      is a compliance convenience, not a hard dependency.

    - **Multi-stage builds are mandatory** because they decouple
      build-time tooling from runtime security. Teams without
      existing multi-stage build experience require initial
      training, but the pattern is well-documented and broadly
      adopted across the industry.
  decision_date: "2020-08-01"
  confidence: high
consequences:
  positive:
    - >-
      Production base-layer CVE counts drop from 50–200 per image
      to near-zero, dramatically reducing security triage overhead
    - >-
      glibc compatibility eliminates an entire category of musl-related
      build failures for Python, Node.js, and Java workloads
    - >-
      No shell in Distroless containers blocks the most common
      post-compromise exploitation techniques used in container escapes
    - >-
      Clear selection rubric prevents ad-hoc base image choices and
      ensures consistent security posture across all deployments
  negative:
    - >-
      Debugging Distroless containers requires Kubernetes ephemeral
      containers or external observability — increasing mean-time-to-
      diagnosis for teams unfamiliar with the workflow
    - >-
      Three base image tiers create CI/CD complexity and require
      ongoing maintenance of per-language, per-tier Dockerfile templates
    - >-
      Chainguard's commercial model introduces a potential vendor
      dependency for organizations that rely on the zero-CVE SLA
confirmation:
  description: |
    The Distroless-first strategy has been validated through
    broad industry adoption and measurable security outcomes:

    **Adoption milestones:**
    - **2017:** Google Distroless project created by Matt Moore
    - **2019:** Kubernetes 1.15+ adopts Distroless for system
      components (kube-apiserver, kube-scheduler, etc.)
    - **2020:** Knative, Tekton, Teleport adopt Distroless
    - **2022:** Chainguard launches Wolfi OS and Chainguard Images,
      independently validating the Distroless philosophy
    - **2023:** Kubernetes ephemeral containers GA in 1.25+,
      solving the Distroless debugging gap
    - **2025:** Docker releases 1000+ hardened distroless-style
      images, open-sourced under Apache 2.0

    **Measurable outcomes:**
    - Trivy/Grype scans show 0 base-layer CVEs for Distroless and
      Chainguard images vs. 50–200 for Debian-slim
    - Container image sizes reduced by 60–95% for most workloads
    - Supply chain compliance (SBOM, SLSA) achievable with
      Chainguard images without additional tooling
  artifact_ids:
    - "https://github.com/GoogleContainerTools/distroless"
    - "https://www.chainguard.dev/chainguard-images"
    - "https://kubernetes.io/docs/concepts/workloads/pods/ephemeral-containers/"
    - "https://snyk.io/blog/choosing-the-best-node-js-docker-image/"
dependencies:
  internal:
    - >-
      Kubernetes ephemeral container support — Distroless debugging
      in production depends on Kubernetes 1.25+ ephemeral containers
      being available in the cluster configuration
    - >-
      CI/CD pipeline multi-stage build support — the build system
      must support multi-stage Docker builds to separate build-time
      tooling from runtime images
  external:
    - >-
      Google Distroless project — maintained by GoogleContainerTools,
      providing base images for Java, Python, Node.js, Go, and Rust
      runtimes based on Debian
    - >-
      Chainguard Images / Wolfi OS — commercial and open-source
      alternative providing glibc-based Distroless images with
      daily rebuilds, SBOMs, and SLSA provenance
    - >-
      Container vulnerability scanners (Trivy, Grype, Snyk) —
      the CVE reduction benefit is only measurable through
      integration with container scanning in CI/CD pipelines

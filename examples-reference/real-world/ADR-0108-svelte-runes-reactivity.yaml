context:
  description: |
    Svelte is a web UI framework with 81,000+ GitHub stars that takes a
    fundamentally different approach from React and Vue: instead of shipping
    a runtime library, Svelte uses a compiler to transform declarative
    component code into highly efficient imperative JavaScript that directly
    manipulates the DOM. Since Svelte 3 (2019), the framework's tagline has
    been "rethinking reactivity" — making JavaScript itself reactive by
    hijacking syntax like `let` declarations and `=` assignments.

    ```mermaid
    graph TD
        subgraph "Svelte 3/4 Implicit Reactivity"
          A["let count = 0"] --> B["Compiler detects<br/>top-level let"]
          B --> C["Assignment count += 1<br/>triggers DOM update"]
          D["$: derived = count * 2"] --> E["Compiler statically<br/>analyzes dependencies"]
          F["svelte/store<br/>writable(), readable()"] --> G["Subscribe/unsubscribe<br/>boilerplate for<br/>cross-component state"]
        end

        subgraph "Resulting Problems"
          H["❌ $: breaks on<br/>refactoring into functions"]
          I["❌ Reactivity only works<br/>inside .svelte files"]
          J["❌ Store API verbose<br/>subscribe/set/update"]
          K["❌ Poor TypeScript<br/>integration"]
          L["❌ Two mental models:<br/>component vs. store"]
        end

        E --> H
        B --> I
        F --> J
        A --> K
        G --> L

        style H fill:#f66,stroke:#333,color:#000
        style I fill:#f66,stroke:#333,color:#000
        style J fill:#f66,stroke:#333,color:#000
        style K fill:#f66,stroke:#333,color:#000
        style L fill:#f66,stroke:#333,color:#000
    ```

    This approach made Svelte feel magical — a common piece of feedback was
    "I wish I could write all my JavaScript like this." However, as
    applications grew in complexity, several fundamental limitations emerged:

    **1. Compile-time dependency tracking breaks on refactoring:**

    The `$:` reactive label determined dependencies at compile time by
    statically analyzing which variables a reactive statement referenced.
    This meant that extracting reactive logic into a function broke
    dependency tracking silently. Rich Harris demonstrated this directly
    in the runes announcement:

    ```javascript
    // This works — compiler sees both width and height
    $: area = width * height;

    // This BREAKS — compiler only sees width, misses height
    const multiplyByHeight = (w) => w * height;
    $: area = multiplyByHeight(width);
    // area won't update when height changes!
    ```

    **2. Reactivity confined to .svelte component boundaries:**

    The `let`-based reactivity only worked at the top level of `.svelte`
    files. Trying to share reactive state across components required
    switching to an entirely different mental model: Svelte stores
    (`writable()`, `readable()`, `derived()`). Code that was reactive
    inside a component became inert when moved to a `.js` file.

    **3. Store API verbosity and cognitive overhead:**

    Svelte stores required explicit `subscribe()`/`unsubscribe()` calls
    or the `$store` auto-subscription syntax (which only worked in
    `.svelte` files). Creating a simple shared counter required:

    ```javascript
    // stores.js — verbose store API
    import { writable, derived } from 'svelte/store';
    export const count = writable(0);
    export const doubled = derived(count, $count => $count * 2);

    // Component.svelte — auto-subscription with $ prefix
    import { count, doubled } from './stores.js';
    $count += 1; // special $ syntax, only in .svelte
    ```

    **4. Poor TypeScript integration:**

    The implicit reactivity model made it difficult for TypeScript to
    understand which variables were reactive. The `$:` label syntax was
    not standard TypeScript, causing type inference issues and requiring
    workarounds. Props declared with `export let` had limited type
    inference capabilities.

    **5. Two incompatible mental models:**

    Developers had to learn two separate reactivity systems: `let`/`$:`
    for component-local state, and stores (`writable`/`readable`/`derived`)
    for cross-component state. The two systems had different APIs,
    different behaviors, and different rules about where they could be
    used. Rich Harris noted that "having code behave one way inside
    .svelte files and another inside .js can make it hard to refactor."

    The broader JavaScript framework ecosystem had been converging on
    signals as the dominant reactivity primitive. SolidJS pioneered
    fine-grained signals, and by 2023, Angular, Qwik, and Preact had all
    adopted signal-based reactivity. As Rich Harris acknowledged: "Like
    every other framework, we've come to the realisation that Knockout
    was right all along."
  business_drivers:
    - >-
      Svelte's developer experience advantage — its primary competitive
      differentiator — was eroding as applications hit the implicit
      reactivity system's complexity ceiling, with refactoring bugs and
      store verbosity frustrating experienced Svelte developers
    - >-
      Framework competition from SolidJS, Angular Signals, and Qwik was
      demonstrating that fine-grained signals deliver both better
      performance and better DX — Svelte risked falling behind the
      industry trend
    - >-
      Enterprise adoption was limited by poor TypeScript integration and
      the inability to share reactive logic outside .svelte components —
      large teams need reactivity that works in plain .js/.ts modules
    - >-
      Vue's Reactivity Transform experiment (tried and abandoned in 2023)
      provided concrete evidence that implicit compiler macros in plain
      JS files cause more confusion than they solve — Svelte needed to
      learn from Vue's mistake while solving the same underlying problem
  technical_drivers:
    - >-
      The $: reactive label used compile-time static analysis for
      dependency tracking — this broke silently when reactive expressions
      were extracted into functions, closures, or separate modules, a
      fundamental architectural limitation
    - >-
      Reactivity was confined to .svelte component files — the let-based
      system could not work in .js or .ts files, preventing reactive
      logic reuse and creating an artificial boundary between component
      and non-component code
    - >-
      The store API (writable/readable/derived) required explicit
      subscribe/unsubscribe lifecycle management and the special $store
      auto-subscription prefix, adding ceremony and cognitive overhead
      for cross-component state
    - >-
      Fine-grained runtime dependency tracking (signals) enables
      surgical DOM updates — only the specific DOM nodes affected by a
      state change are updated, eliminating the component-level
      invalidation overhead of Svelte 3/4
    - >-
      TypeScript could not infer reactivity from let declarations or $:
      labels — the implicit system provided no type-level information
      about which values were reactive versus static
  constraints:
    - >-
      Backward compatibility is mandatory — existing Svelte 4 components
      must continue to work in Svelte 5 without modification, with runes
      as an opt-in feature that can be adopted incrementally
    - >-
      The compiler-first philosophy must be preserved — runes are
      compiler primitives, not runtime functions, maintaining Svelte's
      zero-overhead compilation model
    - >-
      The new API must feel like Svelte, not like React or Vue — while
      inspired by signals, the syntax should preserve Svelte's emphasis
      on minimal boilerplate and direct variable assignment
    - >-
      SvelteKit and the broader Svelte ecosystem (component libraries,
      tooling) must continue working through the transition with minimal
      disruption
  assumptions:
    - >-
      The signals reactivity model is a durable industry pattern — its
      independent adoption by SolidJS, Angular, Qwik, Preact, and now
      Svelte validates it as the successor to both virtual DOM diffing
      and compile-time-only tracking
    - >-
      Developers will accept slightly more verbose syntax (let count =
      $state(0) vs let count = 0) in exchange for universal reactivity,
      better TypeScript support, and freedom from $: edge cases
    - >-
      The opt-in migration strategy (Svelte 4 code works unchanged in
      Svelte 5) will give the ecosystem sufficient time to adopt runes
      without forcing a disruptive migration
    - >-
      Vue's failure with Reactivity Transform validates that runes must
      be clearly distinct from vanilla JavaScript — the $ prefix
      communicates "this is a compiler instruction" rather than silently
      altering JS semantics
architecturally_significant_requirements:
  functional:
    - id: F-001
      description: >
        Runes ($state, $derived, $effect, $props) must provide universal
        reactivity that works identically inside .svelte components,
        .svelte.js modules, and .svelte.ts modules — eliminating the
        boundary between component-local and cross-component reactivity.
    - id: F-002
      description: >
        The $derived rune must use runtime dependency tracking that
        automatically detects dependencies when the expression is
        evaluated, replacing the compile-time static analysis of $: that
        broke when reactive expressions were extracted into functions.
    - id: F-003
      description: >
        The $effect rune must replace both $: side-effect statements and
        lifecycle functions (onMount, afterUpdate, beforeUpdate) with a
        unified side-effect primitive that automatically tracks its
        dependencies and cleans up on re-run.
    - id: F-004
      description: >
        The $props rune must replace export let for component props
        declaration with a destructuring-based API that supports default
        values, rest props, and full TypeScript type inference.
  non_functional:
    - id: NF-001
      description: >
        Fine-grained reactivity must enable surgical DOM updates where
        only the specific DOM nodes affected by a state change are
        updated, improving rendering performance over the component-level
        invalidation model of Svelte 3/4.
    - id: NF-002
      description: >
        All rune primitives must be fully typed for TypeScript, providing
        complete type inference for $state values, $derived computations,
        $props declarations, and $effect cleanup functions.
    - id: NF-003
      description: >
        Existing Svelte 4 components must work unchanged in Svelte 5
        without any modifications — runes are opt-in per component and
        activated by usage, with a provided migration script for
        incremental adoption.
    - id: NF-004
      description: >
        Server-side rendering must remain zero-overhead — the compiler
        must be able to strip signals entirely when generating SSR output,
        since signals are pure overhead on the server where there are no
        reactive updates.
alternatives:
  - name: >-
      Runes — explicit signals-based reactivity with compiler primitives
      ($state, $derived, $effect)
    description: |
      Replace Svelte's implicit reactivity system with "runes" — explicit
      compiler primitives that use function-call syntax with a `$` prefix
      to declare reactive state, derived values, effects, and props. The
      name "runes" evokes "symbols that influence the Svelte compiler,"
      distinguishing them from regular JavaScript functions while
      preserving Svelte's concise authoring style.

      Runes are built on a signals-based runtime that tracks dependencies
      dynamically at evaluation time, rather than statically at compile
      time. This solves the fundamental `$:` limitation: dependencies are
      discovered when code actually runs, not when the compiler analyzes
      source text. Rich Harris acknowledged the broader trend: "Like
      every other framework, we've come to the realisation that Knockout
      was right all along."

      The core runes are:

      - **`$state(value)`** — declares reactive state, replaces `let`
      - **`$derived(expression)`** — computed value, replaces `$:`
      - **`$effect(() => ...)`** — side effect, replaces `$:` + lifecycle
      - **`$props()`** — component props, replaces `export let`
      - **`$bindable()`** — two-way binding declaration

      **Before (Svelte 4 — implicit reactivity):**

      ```svelte
      <script>
        // Only reactive at top level of .svelte files
        let count = 0;
        $: doubled = count * 2;  // compile-time dependency tracking
        $: console.log(doubled);  // side effect mixed with derivation

        // Cross-component state requires different API
        import { writable } from 'svelte/store';
        const store = writable(0);
        $store += 1;  // special $ prefix, .svelte only
      </script>
      ```

      **After (Svelte 5 — runes):**

      ```svelte
      <script>
        // Works in .svelte, .svelte.js, and .svelte.ts
        let count = $state(0);
        const doubled = $derived(count * 2);  // runtime tracking
        $effect(() => console.log(doubled));   // explicit side effect

        // Cross-component state uses the same primitives
        // in counter.svelte.js:
        // export const count = $state(0);
        // export const doubled = $derived(count * 2);
      </script>
      ```

      **Universal reactivity in .svelte.js modules:**

      ```javascript
      // counter.svelte.js — reactive outside components!
      let count = $state(0);

      export function increment() {
        count += 1;  // assignment still triggers updates
      }

      export function getCount() {
        return count;  // returns current reactive value
      }
      ```

      Critically, runes differ from other signals implementations: they
      are compiler primitives, not runtime functions. The Svelte compiler
      transforms `$state(0)` into efficient signal creation code, and
      can strip signals entirely in SSR mode where reactivity is
      unnecessary overhead. This preserves Svelte's compiler-first
      philosophy while gaining signals' runtime benefits.

      ```mermaid
      graph TD
          subgraph "Svelte 5 Runes Architecture"
            A["$state(value)"] --> B["Compiler transforms<br/>to signal creation"]
            C["$derived(expr)"] --> D["Runtime dependency<br/>tracking on evaluation"]
            E["$effect(() => ...)"] --> F["Auto-cleanup<br/>re-run on change"]
            G["$props()"] --> H["Typed destructuring<br/>replaces export let"]
          end

          subgraph "Universal Reactivity"
            I[".svelte components"]
            J[".svelte.js modules"]
            K[".svelte.ts modules"]
            B --> I
            B --> J
            B --> K
          end

          subgraph "Key Benefits"
            L["✅ Runtime dependency<br/>tracking survives<br/>refactoring"]
            M["✅ Universal — works<br/>everywhere, not just<br/>.svelte files"]
            N["✅ Fine-grained DOM<br/>updates via signals"]
            O["✅ Full TypeScript<br/>type inference"]
          end

          style L fill:#2d8,stroke:#333,color:#000
          style M fill:#2d8,stroke:#333,color:#000
          style N fill:#2d8,stroke:#333,color:#000
          style O fill:#2d8,stroke:#333,color:#000
      ```

      **Comparison: Svelte Runes vs. React Hooks vs. Vue Composition API vs. SolidJS Signals:**

      | Feature | Svelte Runes | React Hooks | Vue Composition API | SolidJS Signals |
      |---------|-------------|-------------|--------------------|--------------------|
      | Reactivity model | Compiler + runtime signals | Component re-render | Runtime Proxy-based | Runtime signals |
      | Update granularity | Fine-grained DOM nodes | Entire component tree | Fine-grained (template refs) | Fine-grained DOM nodes |
      | Virtual DOM | No | Yes | Yes | No |
      | State declaration | `$state(0)` | `useState(0)` | `ref(0)` | `createSignal(0)` |
      | Derived values | `$derived(a * b)` | `useMemo(() => a*b, [a,b])` | `computed(() => a.value*b.value)` | `createMemo(() => a()*b())` |
      | Dependency tracking | Automatic (runtime) | Manual (dep arrays) | Automatic (Proxy) | Automatic (getter calls) |
      | Value access | Direct: `count` | Direct: `count` | `.value`: `count.value` | Function call: `count()` |
      | Works outside components | Yes (.svelte.js) | No (Rules of Hooks) | Yes (composables) | Yes (anywhere) |
      | SSR optimization | Compiler strips signals | Hydration required | Hydration required | Hydration required |
      | Conditional calls | Allowed | Forbidden | Allowed | Allowed |
      | Stale closures | No (signals) | Yes (common bug) | No (Proxy) | No (signals) |

      **Concepts made obsolete by runes:**

      - `let` at top-level meaning "reactive" (vs. everywhere else)
      - `export let` for props
      - `$:` reactive labels with all their quirks
      - Different behavior between `<script>` and `<script context="module">`
      - `$$props` and `$$restProps`
      - Lifecycle functions (`afterUpdate` → `$effect`)
      - The store API for most use cases (stores still work but are no
        longer necessary)

      **Evolution timeline:**

      | Date | Milestone | Significance |
      |------|-----------|--------------|
      | Apr 2019 | Svelte 3 released | "Rethinking reactivity" — implicit $: system established |
      | 2020-21 | Svelte adoption grows | Community feedback: "I wish all JS was reactive like this" |
      | Oct 2022 | Vue abandons Reactivity Transform | Validates that implicit macros in .js cause confusion |
      | Mid 2023 | Signals trend accelerates | SolidJS, Angular, Qwik, Preact adopt signals |
      | Sep 2023 | Runes announced (blog post) | "Introducing runes" — rethinking rethinking reactivity |
      | Oct 2023 | Svelte 5 preview site | Interactive playground for community testing |
      | Oct 2024 | Svelte 5.0 released | Runes available as opt-in; Svelte 4 code still works |
      | 2025+ | Ecosystem migration | Component libraries and SvelteKit adopt runes |
    pros:
      - Universal reactivity works identically in .svelte components,
        .svelte.js modules, and .svelte.ts files — eliminating the
        artificial boundary between component and non-component code
      - Runtime dependency tracking survives refactoring — extracting
        reactive logic into functions, closures, or separate modules does
        not break dependency detection
      - Fine-grained signal-powered DOM updates enable surgical
        re-rendering of only the specific DOM nodes that changed, not
        entire component subtrees
      - Full TypeScript type inference for all rune primitives — $state
        values, $derived computations, and $props declarations are
        fully typed without workarounds
      - Unifies component state ($state), derived values ($derived),
        side effects ($effect), and props ($props) under one consistent
        API — replacing five separate concepts
      - Compiler-first implementation preserves Svelte's zero-overhead
        philosophy — signals are stripped in SSR mode where they add
        only overhead
      - >-
        Backward compatible — existing Svelte 4 components work unchanged
        in Svelte 5, with runes activated per component by usage, enabling
        incremental migration
      - Eliminates the store API for most use cases — reactive state in
        .svelte.js modules replaces writable/readable/derived with the
        same primitives used inside components
    cons:
      - Increases verbosity for the simplest cases — let count = $state(0)
        is more characters than let count = 0 in Svelte 4
      - >-
        Community perception of "making Svelte look like React" — the
        function-call syntax ($state, $effect) visually resembles React
        Hooks (useState, useEffect), eroding Svelte's identity as the
        "less code" framework
      - >-
        New learning curve for existing Svelte developers who internalized
        the implicit $: mental model and must now learn rune equivalents
      - Migration effort required — while backward compatible, ecosystem
        libraries and tutorials must eventually update to runes syntax
      - >-
        The .svelte.js/.svelte.ts file extension requirement for reactive
        modules is an artificial constraint — runes cannot be used in
        plain .js files, only in Svelte-aware file extensions
      - >-
        $effect can lead to the same overuse patterns as React's useEffect
        — developers may create unnecessary effects where $derived would
        suffice, replicating a known React anti-pattern
    estimated_cost: high
    risk: medium
  - name: >-
      Keep implicit $: reactivity — the Svelte 3/4 status quo
    description: |
      Continue with the existing implicit reactivity system where `let`
      declarations at the top level of `.svelte` components are
      automatically reactive, `$:` labels create reactive statements,
      and Svelte stores provide cross-component state management. Address
      known issues through incremental improvements: better static
      analysis, improved TypeScript support via tooling, and enhanced
      store APIs.

      This is the "maintain what made Svelte special" approach. Svelte's
      implicit reactivity was the framework's defining feature — the
      ability to write `let count = 0` and have `count += 1` automatically
      update the DOM felt magical. It was the core of the "write less
      code" philosophy and the primary reason developers chose Svelte
      over React or Vue.

      Incremental improvements could address specific pain points:

      - **Better $: analysis:** Improve the compiler's static analysis
        to follow dependencies through function calls
      - **Store ergonomics:** Simplify the store API to reduce
        subscribe/unsubscribe boilerplate
      - **TypeScript tooling:** Improve svelte-language-server to
        provide better type inference for reactive variables
      - **Explicit opt-in annotations:** Add optional type annotations
        that hint at reactivity without changing the core model

      ```svelte
      <script>
        // The Svelte magic that developers loved
        let count = 0;  // reactive — just let!
        $: doubled = count * 2;  // reactive derivation
        $: console.log(doubled);  // reactive side effect

        function increment() {
          count += 1;  // just assignment!
        }
      </script>

      <button on:click={increment}>
        {count} × 2 = {doubled}
      </button>
      ```

      ```mermaid
      graph TD
          A["Keep $: Reactivity"] --> B{Known Problems}
          B --> C["❌ Breaks on<br/>refactoring"]
          B --> D["❌ .svelte only —<br/>no universal reactivity"]
          B --> E["❌ Store API<br/>remains verbose"]
          B --> F["❌ TypeScript issues<br/>persist"]

          G{Incremental Fixes?}
          G --> H["⚠️ Static analysis<br/>improvements are<br/>fundamentally limited"]
          G --> I["⚠️ Store ergonomics<br/>are a band-aid"]

          style C fill:#f66,stroke:#333,color:#000
          style D fill:#f66,stroke:#333,color:#000
          style E fill:#f66,stroke:#333,color:#000
          style F fill:#f66,stroke:#333,color:#000
      ```
    pros:
      - Zero migration cost — all existing Svelte 4 code, tutorials,
        blog posts, and component libraries continue to work unchanged
      - Preserves Svelte's defining "write less code" philosophy — let
        count = 0 is the simplest possible reactive declaration
      - No community disruption — avoids the backlash from developers
        who chose Svelte specifically for its minimal, magic-driven API
      - >-
        The existing system works well for simple to moderate-complexity
        components where $: edge cases rarely manifest
      - Maintains Svelte's strongest marketing differentiator against
        React and Vue — the "less boilerplate" advantage
    cons:
      - >-
        The $: dependency tracking is fundamentally limited by static
        compile-time analysis — it cannot follow dependencies through
        function calls, closures, or dynamic expressions, and no amount
        of compiler improvement can fully solve this
      - >-
        Reactivity remains confined to .svelte component files — the
        let-based system architecturally cannot work in .js or .ts
        files, permanently preventing reactive logic reuse
      - >-
        The store API (writable/readable/derived) is a separate,
        verbose mental model that developers must learn alongside the
        let/$: system — this duality cannot be eliminated without a
        fundamental redesign
      - >-
        TypeScript integration remains structurally limited — the
        compiler's implicit transformations are opaque to TypeScript's
        type system, and no tooling workaround can provide the type
        safety that explicit declarations enable
      - The framework falls behind the industry trend toward signals —
        SolidJS, Angular, Qwik, and Preact all adopted signals, leaving
        Svelte's compile-time-only model as an outlier
    estimated_cost: low
    risk: high
    rejection_rationale: >
      The implicit $: reactivity system's problems are architectural,
      not incidental. Static compile-time dependency tracking is
      fundamentally unable to follow dependencies through function
      calls or closures — this is not a bug to fix but a design
      limitation of the approach. Rich Harris demonstrated this
      directly: extracting "$: area = width * height" into a function
      silently breaks dependency tracking, producing stale values with
      no warning. The confinement of reactivity to .svelte files is
      equally fundamental — the Let-based system relies on compiler
      context that does not exist in plain .js files. The store API is
      an acknowledgment that the implicit system is insufficient for
      cross-component state, but its verbose subscribe/set/update
      ceremony contradicts Svelte's "write less code" philosophy. Every
      competing framework had adopted signals by 2023, validating that
      runtime dependency tracking is the industry-standard solution.
      Incremental improvements would address symptoms while leaving the
      architectural limitation in place.
  - name: >-
      Adopt Vue-style Reactivity Transform — compiler macros that
      eliminate .value boilerplate
    description: |
      Adopt an approach similar to Vue's Reactivity Transform, where
      compiler macros automatically transform reactive variable
      declarations to eliminate boilerplate. Vue's Reactivity Transform
      (introduced experimentally in Vue 3.2, removed in Vue 3.4) used
      `$ref()`, `$computed()`, and `$()` macros that compiled away
      `.value` access — making `let count = $ref(0)` behave as if
      `count` were a plain variable while actually being a reactive ref
      under the hood.

      The Svelte equivalent would use similar compiler macros to make
      reactivity work in `.js` and `.ts` files while preserving the
      "looks like vanilla JavaScript" aesthetic.

      **Vue's Reactivity Transform — the experiment that failed:**

      ```javascript
      // Vue Reactivity Transform (DEPRECATED)
      let count = $ref(0)       // compiles to: const count = ref(0)
      count++                    // compiles to: count.value++
      const doubled = $computed(() => count * 2)
      // Looks like vanilla JS, but isn't — "compiler magic"
      ```

      ```mermaid
      graph TD
          A["Vue Reactivity Transform<br/>(tried and abandoned)"] --> B{Vue's Experience}
          B --> C["❌ Altered vanilla JS<br/>semantics in .vue files"]
          B --> D["❌ Variable assignment<br/>had hidden side effects"]
          B --> E["❌ Difficult to tell<br/>reactive from non-reactive"]
          B --> F["❌ Removed in Vue 3.4<br/>(Feb 2024)"]

          G["Apply to Svelte?"] --> H{Same Problems Apply}
          H --> I["❌ Would alter .js<br/>file semantics"]
          H --> J["❌ Makes reactivity<br/>invisible — opposite<br/>of solving $: problems"]

          style C fill:#f66,stroke:#333,color:#000
          style D fill:#f66,stroke:#333,color:#000
          style E fill:#f66,stroke:#333,color:#000
          style F fill:#f66,stroke:#333,color:#000
          style I fill:#f66,stroke:#333,color:#000
          style J fill:#f66,stroke:#333,color:#000
      ```

      Vue's team abandoned Reactivity Transform specifically because it
      "invaded normal JavaScript/TypeScript files, altering vanilla
      semantics." The Vue team concluded that transforms which "require
      a build step and essentially create a language that looks like
      JavaScript but compiles into something else" were not a good fit.
    pros:
      - Preserves the visual simplicity of vanilla JavaScript — reactive
        code looks identical to non-reactive code
      - Eliminates .value boilerplate (Vue's specific problem) which
        could analogously eliminate $ prefix verbosity
      - Could potentially work in .js/.ts files, extending reactivity
        outside .svelte components
      - Familiar precedent — developers who used Vue's Reactivity
        Transform would recognize the pattern
    cons:
      - >-
        Vue explicitly tried this approach and abandoned it — the
        Reactivity Transform was removed in Vue 3.4 because it altered
        vanilla JavaScript semantics, making it unclear which variables
        were reactive and which were not
      - >-
        Makes reactivity invisible rather than explicit — this is the
        opposite of solving Svelte's $: problems, where the core
        complaint was that reactivity was too implicit and confusing
      - >-
        Altered assignment semantics (count++ having hidden reactive
        side effects) violates the principle of least surprise in .js
        files where developers expect standard JavaScript behavior
      - >-
        The Vue team concluded that compiler transforms creating "a
        language that looks like JavaScript but compiles into something
        else" are architecturally unsound — this is directly applicable
        to Svelte considering the same approach
      - >-
        Does not solve the dependency tracking problem — compile-time
        macro expansion has the same static analysis limitations as $:
    estimated_cost: medium
    risk: high
    rejection_rationale: >
      Vue's Reactivity Transform is the strongest possible rejection
      evidence: another major framework actually built, shipped, and
      then removed this exact approach. Vue's team concluded that
      compiler macros that alter vanilla JavaScript semantics cause
      more confusion than they solve — developers could not tell which
      variables were reactive and which were not, especially in larger
      codebases. Rich Harris explicitly acknowledged Vue's experience
      when designing runes, stating that Svelte's $state and Vue's $ref
      "are quite different" — $state does not provide access to an
      underlying object and enforces strict read/write separation.
      The runes approach makes reactivity explicit (you see $state and
      know it's reactive) rather than invisible (a plain let that
      secretly compiles to something else). Vue's abandonment of
      Reactivity Transform in Vue 3.4 (February 2024) provided
      concrete validation for Svelte's more explicit design.
  - name: >-
      Adopt React Hooks model — useState/useEffect function-based
      reactivity
    description: |
      Adopt React's Hooks model where state and effects are declared
      through function calls (`useState`, `useEffect`, `useMemo`,
      `useCallback`) within component render functions. Components
      re-execute on every state change, and hooks maintain state
      across re-renders through a positional calling convention.

      React Hooks revolutionized React development when introduced in
      2018 (React 16.8), and Rich Harris explicitly compared runes to
      Hooks: "I'd compare it to React's Hooks, which was a significant
      improvement to their component model."

      ```javascript
      // React Hooks model
      function Counter() {
        const [count, setCount] = useState(0);
        const doubled = useMemo(() => count * 2, [count]);
        useEffect(() => {
          console.log(doubled);
        }, [doubled]);

        return <button onClick={() => setCount(c => c + 1)}>
          {count} × 2 = {doubled}
        </button>;
      }
      ```

      ```mermaid
      graph TD
          A["React Hooks Model"] --> B{Adoption Barriers for Svelte}
          B --> C["❌ Component-level<br/>re-renders, not<br/>fine-grained"]
          B --> D["❌ Manual dependency<br/>arrays = stale closure<br/>bugs"]
          B --> E["❌ Rules of Hooks<br/>(no conditional calls)"]
          B --> F["❌ Virtual DOM<br/>overhead"]
          B --> G["❌ Contradicts Svelte's<br/>compiler-first design"]

          style C fill:#f66,stroke:#333,color:#000
          style D fill:#f66,stroke:#333,color:#000
          style E fill:#f66,stroke:#333,color:#000
          style F fill:#f66,stroke:#333,color:#000
          style G fill:#f66,stroke:#333,color:#000
      ```
    pros:
      - Massive ecosystem precedent — React Hooks are the most widely
        used state management pattern in frontend development
      - Well-understood mental model with extensive documentation,
        tutorials, and developer familiarity
      - Proven at scale in production applications across every industry
      - Rich composition patterns — custom hooks enable reusable stateful
        logic
    cons:
      - >-
        Component-level re-renders — when state changes, React
        re-executes the entire component function and diffs the virtual
        DOM, which is fundamentally less efficient than signal-based
        fine-grained updates
      - >-
        Manual dependency arrays cause stale closure bugs — the most
        common class of React bugs (stale state in useEffect,
        missing dependencies in useMemo) stems from the manual
        dependency tracking that signals solve automatically
      - >-
        Rules of Hooks (no conditional calls, must be at top level)
        are an artificial constraint imposed by the positional calling
        convention — runes and signals have no such restriction
      - >-
        Requires a virtual DOM for reconciliation — adopting the Hooks
        execution model would require Svelte to add a virtual DOM,
        abandoning its compiler-based direct DOM mutation advantage
      - The setter function pattern (setCount(c => c + 1)) is more
        verbose than Svelte's direct assignment (count += 1)
    estimated_cost: high
    risk: critical
    rejection_rationale: >
      The React Hooks model is architecturally incompatible with
      Svelte's compiler-first, no-virtual-DOM design. Hooks require
      component-level re-execution on every state change, followed by
      virtual DOM diffing — this contradicts Svelte's approach of
      compiling to direct DOM mutations. Manual dependency arrays are
      a known source of bugs (stale closures, missing dependencies)
      that signals solve through automatic tracking. The Rules of
      Hooks (no conditional calls) are an artificial constraint that
      runes avoid entirely. While Rich Harris compared runes' impact
      to Hooks' impact on React, the execution model is fundamentally
      different: runes use signals for fine-grained reactivity without
      re-rendering, while Hooks re-execute entire components. Svelte
      took inspiration from Hooks' composability patterns while
      deliberately avoiding their architectural limitations.
  - name: >-
      Adopt SolidJS signals API — createSignal/createEffect/createMemo
    description: |
      Adopt SolidJS's signals API directly, using `createSignal`,
      `createEffect`, and `createMemo` as the reactivity primitives.
      SolidJS is the framework closest to Svelte in philosophy — both
      compile to efficient DOM operations without a virtual DOM, and
      both use fine-grained reactivity. Rich Harris acknowledged that
      Svelte 5's signals were inspired by SolidJS's approach.

      SolidJS signals work through a getter/setter pattern: `createSignal`
      returns a tuple of `[getter, setter]`, and reactive computations
      automatically subscribe to signals when the getter is called.

      ```javascript
      // SolidJS signals pattern
      import { createSignal, createEffect, createMemo } from 'solid-js';

      const [count, setCount] = createSignal(0);
      const doubled = createMemo(() => count() * 2);
      createEffect(() => console.log(doubled()));

      // Reading requires function call: count()
      // Writing requires setter: setCount(c => c + 1)
      ```

      ```mermaid
      graph TD
          A["SolidJS Signals API"] --> B{Design Differences}
          B --> C["Getter/Setter tuple<br/>from createSignal"]
          B --> D["Value access via<br/>function call: count()"]
          B --> E["Runtime-only:<br/>no compiler optimization"]

          F{Svelte Design Goals}
          F --> G["Direct value access:<br/>count (not count())"]
          F --> H["Assignment triggers<br/>update: count += 1"]
          F --> I["Compiler strips signals<br/>in SSR mode"]

          style G fill:#2d8,stroke:#333,color:#000
          style H fill:#2d8,stroke:#333,color:#000
          style I fill:#2d8,stroke:#333,color:#000
      ```
    pros:
      - Closest framework in philosophy — SolidJS shares Svelte's no
        virtual DOM approach and fine-grained reactivity goals
      - Proven performance — SolidJS consistently benchmarks as one of
        the fastest frameworks
      - Mature API with well-understood patterns and growing ecosystem
      - Universal — signals work anywhere, not just in components
    cons:
      - >-
        Getter/setter function-call syntax (count() to read, setCount()
        to write) introduces more ceremony than Svelte's direct variable
        access — Svelte's runes preserve direct assignment (count += 1)
        while SolidJS requires setCount(c => c + 1)
      - >-
        TypeScript type narrowing issues — accessing values via function
        calls creates type inference challenges that Svelte's compiler-
        based approach avoids by making $state values behave as their
        declared types
      - >-
        Runtime-only signals cannot be stripped by the compiler for SSR —
        Svelte's compiler-based approach can eliminate signals entirely
        when generating server-side rendering code, where reactive
        tracking is pure overhead
      - >-
        Adopting another framework's API wholesale would make Svelte a
        "SolidJS with different templating" — sacrificing the identity
        and developer experience that differentiates Svelte
    estimated_cost: medium
    risk: medium
    rejection_rationale: >
      While SolidJS signals were a major inspiration for Svelte's runes,
      directly adopting the SolidJS API would sacrifice Svelte's core
      ergonomic advantages. Rich Harris noted that "signals are an
      under-the-hood implementation detail rather than something you
      interact with directly" in Svelte 5. This means Svelte avoids
      the getter/setter function-call pattern (count() vs. count) and
      the type narrowing issues that arise when values are accessed by
      function call. Svelte's compiler can also strip signals entirely
      in SSR mode — something a runtime-only signals API cannot do.
      Runes take the best of SolidJS's reactivity model (fine-grained,
      automatic dependency tracking) while wrapping it in
      Svelte-idiomatic syntax that preserves direct variable access
      and assignment semantics.
  - name: >-
      Keep Svelte stores as the primary cross-component state mechanism
    description: |
      Rather than redesigning the entire reactivity system, enhance
      and promote Svelte stores (`writable`, `readable`, `derived`)
      as the primary mechanism for all shared state. Improve the store
      API ergonomics, add TypeScript generics, and extend the `$store`
      auto-subscription syntax to work in more contexts.

      Svelte stores are the existing solution for cross-component state:

      ```javascript
      // stores.js
      import { writable, derived } from 'svelte/store';

      export const count = writable(0);
      export const doubled = derived(count, $c => $c * 2);

      // Component.svelte
      <script>
        import { count, doubled } from './stores.js';

        function increment() {
          $count += 1;  // auto-subscription syntax
        }
      </script>

      <p>{$count} × 2 = {$doubled}</p>
      ```

      ```mermaid
      graph TD
          A["Enhanced Stores"] --> B{Limitations Remain}
          B --> C["❌ $store prefix<br/>only in .svelte"]
          B --> D["❌ subscribe/set/update<br/>ceremony in .js"]
          B --> E["❌ Two APIs:<br/>let/$: + stores"]
          B --> F["❌ No fine-grained<br/>DOM updates"]

          style C fill:#f66,stroke:#333,color:#000
          style D fill:#f66,stroke:#333,color:#000
          style E fill:#f66,stroke:#333,color:#000
          style F fill:#f66,stroke:#333,color:#000
      ```
    pros:
      - Zero migration cost — stores are already part of Svelte and
        used extensively in the ecosystem
      - The store contract (subscribe method) is simple and interoperable
        with RxJS observables and other reactive libraries
      - Separates "local state" (let) from "shared state" (stores),
        which some developers find to be a clean conceptual separation
      - The $store auto-subscription syntax in .svelte files provides
        acceptable ergonomics for many use cases
    cons:
      - >-
        The $store auto-subscription prefix only works in .svelte files —
        in .js/.ts files, developers must manually call
        store.subscribe()/store.set()/store.update(), which is verbose
        and error-prone (forgetting to unsubscribe causes memory leaks)
      - >-
        Stores maintain the two-mental-model problem — developers must
        learn both let/$: reactivity for components and
        writable/readable/derived for cross-component state, with
        different APIs and different rules
      - >-
        Stores operate at the whole-value level without fine-grained
        reactivity — changing one property of a store value re-notifies
        all subscribers, without the surgical DOM updates that signals
        enable
      - >-
        Poor TypeScript ergonomics — store type inference requires
        `Writable<T>` and `Readable<T>` generic wrappers, and the $store
        auto-subscription has limited type narrowing
    estimated_cost: low
    risk: medium
    rejection_rationale: >
      Stores were the existing acknowledgment that Svelte's implicit
      reactivity system was insufficient for cross-component state,
      but their API introduced its own problems: verbose
      subscribe/set/update ceremony, the $store prefix that only works
      in .svelte files, and a separate mental model from let/$:
      reactivity. Enhancing stores without addressing the fundamental
      reactive model would preserve the core problem — two incompatible
      reactivity systems with different APIs, different rules, and
      different capabilities. Runes eliminate the need for stores in
      most use cases by making $state/derived work in .svelte.js
      modules, providing a single unified reactivity API across all
      contexts. Rich Harris noted that while stores "are not being
      deprecated," runes make them "no longer necessary" for the
      majority of use cases.
decision:
  chosen_alternative: >-
    Runes — explicit signals-based reactivity with compiler primitives
    ($state, $derived, $effect)
  rationale: |
    Runes were chosen because they address all five of Svelte's
    reactivity system limitations simultaneously — dependency tracking,
    universal reactivity, store verbosity, TypeScript support, and
    mental model unification — while preserving Svelte's compiler-first
    philosophy and backward compatibility:

    1. **Runtime dependency tracking that survives refactoring**: The
       `$derived` and `$effect` runes track dependencies at evaluation
       time, not compile time. Unlike `$:`, extracting reactive logic
       into functions, closures, or separate modules does not break
       tracking. This solves the most fundamental limitation of the
       implicit system.

    2. **Universal reactivity across all file types**: Runes work
       identically in `.svelte` components, `.svelte.js` modules, and
       `.svelte.ts` files. Reactive state can be exported from a
       `.svelte.js` module and consumed by any component, eliminating
       the need for the store API in most cases.

    3. **Signals as implementation detail, not API**: Unlike SolidJS
       (getter/setter functions) or Vue (Proxy-based refs), Svelte's
       runes expose signals through compiler primitives that preserve
       direct variable access. `$state(0)` creates a signal, but you
       read and write the value directly (`count += 1`), not through
       a getter function (`count()`) or `.value` property. This was a
       deliberate design choice to "maximise both efficiency and
       ergonomics."

    4. **Vue's Reactivity Transform as counter-example**: Vue's attempt
       at implicit compiler macros (`$ref`, `$computed`) was tried,
       shipped experimentally, and then abandoned in Vue 3.4. The Vue
       team's conclusion — that macros altering vanilla JS semantics
       cause confusion — directly informed runes' design. Runes are
       explicitly marked with `$` to communicate "this is a compiler
       instruction," not a plain JavaScript function.

    5. **Backward compatibility as migration strategy**: Svelte 5 is a
       drop-in replacement for Svelte 4 — existing components work
       unchanged. Runes are opt-in per component, activated by usage.
       A migration script (`npx sv migrate svelte-5`) automates the
       conversion. This additive strategy avoids the disruption that
       a breaking change would cause.

    6. **Fine-grained performance via signals**: Signals enable surgical
       DOM updates where only the specific nodes affected by a state
       change are updated. This moves Svelte from component-level
       invalidation to node-level precision, delivering what Rich
       Harris called "ridonkulously fast" performance.
  tradeoffs: |
    - **Verbosity increase accepted** because the slightly longer syntax
      (`let count = $state(0)` vs. `let count = 0`) is the price of
      explicitness. The ability to see at a glance which values are
      reactive justifies the extra characters. Rich Harris addressed
      this directly: "Isn't it better if let count is reactive by
      default? Well, no."

    - **"Making Svelte look like React" perception accepted** because
      the similarity is superficial. Unlike React Hooks, runes use
      automatic dependency tracking (no dep arrays), allow conditional
      calls, avoid stale closures, and produce fine-grained DOM updates
      without a virtual DOM. The function-call syntax serves a different
      architectural purpose.

    - **Community backlash accepted** as the cost of solving real
      architectural problems. Developers who loved Svelte's implicit
      magic were vocal in their criticism, but the $: system's
      refactoring bugs, store verbosity, and TypeScript limitations
      were concrete pain points that grew with application complexity.

    - **New learning curve accepted** because runes actually simplify
      the overall mental model. Developers must learn new syntax, but
      runes eliminate five separate concepts ($:, export let, stores,
      lifecycle functions, $$props/$$restProps), replacing them with
      one consistent system.

    - **Migration effort accepted** because it is opt-in and
      incremental. The migration script automates conversion, and
      Svelte 4 code continues to work. The ecosystem has time to
      adapt without a forced deadline.
  decision_date: "2024-10-22"
  confidence: high
consequences:
  positive:
    - >-
      Universal reactivity achieved — $state, $derived, $effect work
      identically in .svelte, .svelte.js, and .svelte.ts files, eliminating
      the component-file boundary
    - >-
      Dependency tracking reliability restored — runtime evaluation-based
      tracking survives refactoring into functions and separate modules
      without silent breakage
    - >-
      Five separate concepts unified — let-reactivity, $: labels, export
      let, lifecycle functions, and stores replaced by $state, $derived,
      $effect, and $props
    - >-
      Fine-grained signal-powered DOM updates deliver surgical re-rendering
      — only affected DOM nodes updated, improving over Svelte 3/4's
      component-level invalidation
    - >-
      TypeScript integration substantially improved — all rune
      primitives provide full type inference, and $props with
      destructuring enables compile-time type checking for component
      interfaces
    - >-
      Store API rendered optional — reactive state in .svelte.js modules
      provides cross-component sharing with the same primitives, eliminating
      writable/readable/derived for most cases
  negative:
    - >-
      Community perception of identity loss — vocal developers criticized
      runes as "making Svelte look like React," arguing it erodes the
      "write less code" differentiator
    - >-
      Ecosystem migration effort — component libraries, documentation,
      and tutorials must update from Svelte 4 to runes syntax, creating
      sustained maintenance burden
    - >-
      Two coexisting syntaxes during transition — Svelte 4 and 5 both
      work in the same project, which can confuse newcomers encountering
      both styles
    - >-
      $effect overuse risk — developers may overuse $effect where $derived
      would suffice, replicating React useEffect anti-patterns
    - >-
      Increased verbosity for simplest cases — the counter example
      (Svelte's canonical demo) requires more characters with runes,
      weakening the framework's marketing narrative of minimalism
confirmation:
  description: |
    The runes decision has progressed through multiple milestones
    confirming its viability and ecosystem adoption:

    **Announcement and preview phase:**
    - **September 20, 2023:** "Introducing runes" blog post published
      on svelte.dev, presenting the design rationale and interactive
      preview site
    - **October 2023:** Svelte 5 preview site launched with interactive
      playground for community testing and feedback

    **Release and adoption:**
    - **October 22, 2024:** Svelte 5.0 released with runes as an
      opt-in feature. Existing Svelte 4 components work unchanged.
      Migration script (`npx sv migrate svelte-5`) provided for
      automated conversion.

    **Migration tooling:**
    - `npx sv migrate svelte-5` automatically converts Svelte 4
      components to runes syntax — `let` → `$state`, `$:` → `$derived`
      / `$effect`, `export let` → `$props()`
    - Svelte 5 compiler produces deprecation warnings for legacy syntax,
      guiding incremental migration

    **Ecosystem compatibility:**
    - SvelteKit updated to support runes in all component types
    - Major component libraries (Skeleton UI, Svelte Headless UI)
      began runes migration
    - svelte.dev documentation reorganized with runes as the primary
      API and legacy syntax in a "legacy APIs" section
  artifact_ids:
    - "https://svelte.dev/blog/runes"
    - "https://svelte.dev/blog/svelte-5-is-alive"
    - "https://svelte.dev/docs/svelte/v5-migration-guide"
    - "https://github.com/sveltejs/svelte/releases/tag/svelte%405.0.0"
    - "https://svelte-5-preview.vercel.app"
dependencies:
  internal:
    - >-
      Svelte Compiler — the compiler transforms rune primitives ($state,
      $derived, $effect, $props) into efficient signal creation and
      tracking code, and can strip signals entirely for SSR output
    - >-
      SvelteKit — the application framework that must support runes in
      all component, page, and layout files across both client and
      server rendering
    - >-
      Svelte Language Server — the IDE integration that provides
      autocomplete, type checking, and diagnostics for rune primitives
      in .svelte, .svelte.js, and .svelte.ts files
  external:
    - >-
      TypeScript — runes provide full type inference, requiring close
      integration between the Svelte compiler's type generation and
      TypeScript's type system
    - >-
      Vite — Svelte's recommended build tool, whose Svelte plugin
      (vite-plugin-svelte) must support Svelte 5's new compiler output
      and .svelte.js/.svelte.ts file extensions
    - >-
      Component library ecosystem — Skeleton UI, Svelte Headless UI,
      and other component libraries must migrate from Svelte 4 syntax
      to runes for full Svelte 5 compatibility

audit_trail:
  - event: created
    by: Lei Zhang (resouer)
    at: "2020-09-14T00:00:00Z"
    details: >
      KEP-2221 created proposing the removal of dockershim from kubelet.
      Authored by Lei Zhang (@resouer) and Davanum Srinivas (@dims) under
      SIG-Node ownership.
  - event: approved
    by: Dawn Chen
    at: "2020-12-08T00:00:00Z"
    details: >
      KEP approved by SIG-Node approvers. Dockershim deprecated in Kubernetes
      v1.20 with deprecation warnings added to kubelet startup logs. "Don't
      Panic: Kubernetes and Docker" FAQ published on kubernetes.io.
  - event: updated
    by: SIG-Node
    at: "2022-02-03T00:00:00Z"
    details: >
      KEP updated to reflect latest state for v1.24 release. Dockershim
      removal criteria met: CRI is CRI-generic, e2e tests updated, Windows
      support verified, migration documentation published.
  - event: updated
    by: SIG-Node
    at: "2022-05-03T00:00:00Z"
    details: >
      Kubernetes v1.24 released with dockershim completely removed. kubelet
      built with `dockerless` tag by default. cri-dockerd available as
      external adapter maintained by Mirantis and Docker.

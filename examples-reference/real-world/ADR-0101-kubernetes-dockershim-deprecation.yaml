adr:
  id: ADR-0101-kubernetes-dockershim-deprecation
  title: Deprecate and remove built-in dockershim in favor of CRI-compliant container runtimes
  y_statement: >-
    In the context of the Kubernetes kubelet's container runtime integration,
    facing an unsustainable maintenance burden from the built-in dockershim
    compatibility layer that bridged the non-CRI-compliant Docker Engine to the
    Container Runtime Interface, we decided for removing dockershim from the
    kubelet and requiring CRI-compliant runtimes (containerd, CRI-O) and
    neglected continuing to maintain dockershim in-tree, extracting dockershim
    to an out-of-tree Kubernetes-maintained component, and waiting for Docker
    Engine to implement CRI natively, to achieve reduced kubelet complexity,
    elimination of Docker-specific maintenance burden, and unblocking of
    runtime-related enhancements (cgroups v2, user namespaces), accepting
    massive migration pain for every cluster operator globally and the risk of
    community confusion from the "Kubernetes is dropping Docker" narrative,
    because Docker Engine's architecture as a full platform (image building,
    networking, volumes) rather than a focused container runtime meant the shim
    would never converge with the CRI standard, and mature CRI-native runtimes
    (containerd — itself extracted from Docker — and CRI-O) had proven
    production-ready at scale.
  status: accepted
  created_at: "2020-12-08T00:00:00Z"
  last_modified: "2022-05-03T00:00:00Z"
  version: "1.0"
  schema_version: "1.0.0"
  project: Kubernetes
  component: kubelet / Container Runtime Integration
  tags:
    - container-runtime
    - cri
    - dockershim
    - containerd
    - cri-o
    - decoupling
    - interface-standardization
    - deprecation
  priority: critical
  decision_type: technology
  decision_level: strategic

context:
  summary: |
    The Kubernetes kubelet uses the Container Runtime Interface (CRI), a gRPC-based
    plugin API introduced in Kubernetes v1.5 (2016), to communicate with container
    runtimes. CRI was designed so that any runtime implementing the interface could
    be used interchangeably. However, Docker Engine — the original and most widely
    used container runtime — predates CRI and does not implement it natively.

    To bridge this gap, Kubernetes maintained a built-in compatibility layer called
    **dockershim** inside the kubelet codebase. Dockershim translated CRI calls into
    Docker Engine API calls, allowing Docker to function as a Kubernetes runtime
    despite not speaking CRI directly.

    ```mermaid
    graph TD
        subgraph "With Dockershim (pre-v1.24)"
          K1[kubelet] -->|CRI gRPC| DS[dockershim]
          DS -->|Docker API| DE[Docker Engine]
          DE --> CD[containerd]
          CD --> R1[runc]
        end

        subgraph "Without Dockershim (v1.24+)"
          K2[kubelet] -->|CRI gRPC| CT[containerd / CRI-O]
          CT --> R2[runc]
        end

        style DS fill:#f96,stroke:#333,color:#000
        style CT fill:#2d8,stroke:#333,color:#000
    ```

    This architecture introduced two fundamental problems:

    1. **Unnecessary indirection**: The kubelet communicated through dockershim to
       Docker Engine, which itself delegated to containerd, which called runc. Two
       extra layers existed between the kubelet and the actual container execution.

    2. **Maintenance burden**: Every CRI enhancement, bug fix, or security patch
       required parallel work on both the CRI path and the dockershim path. Docker-
       specific integrations (journald log driver, Docker-specific cgroup management,
       legacy log providers) created ongoing maintenance overhead for SIG-Node
       maintainers.

    By 2020, two CRI-native runtimes had reached production maturity:
    - **containerd** (CNCF graduated, extracted from Docker itself, used by Docker
      Engine internally)
    - **CRI-O** (CNCF incubating, purpose-built for Kubernetes, used by OpenShift
      in production since June 2019)

    The dockershim had become an anomaly — the only runtime integration maintained
    inside the kubelet rather than as an external CRI implementation. Removing it
    would align Kubernetes's architecture with its own CRI standard.
  business_drivers:
    - Kubernetes is the dominant container orchestration platform with 92% market
      share and 5.6 million developers — every cluster worldwide is affected by
      runtime architecture decisions
    - Managed Kubernetes services (GKE, EKS, AKS) need runtime flexibility to
      optimize their infrastructure without being constrained by Docker-specific
      assumptions in the kubelet
    - Enterprise security teams require reduced attack surface and dependency
      footprint — dockershim vendors the entire Docker client library into kubelet
    - Runtime innovation (kata containers, gVisor, Firecracker) is blocked by
      Docker-specific assumptions in the kubelet's runtime integration
  technical_drivers:
    - Dockershim maintenance imposes ongoing burden on SIG-Node maintainers —
      every CRI change requires parallel dockershim updates
    - Docker-specific integrations (legacyLogProvider, journald log driver, Docker
      cgroup management) create backdoor dependencies that complicate kubelet code
    - The dockershim architecture adds two unnecessary layers (Docker Engine →
      containerd → runc) compared to direct CRI runtime communication
    - Advanced container features (cgroups v2, user namespaces) are incompatible
      with the dockershim architecture and blocked from implementation
    - The kubelet vendors the entire docker/docker repository and transitive
      dependencies, bloating the binary and increasing CVE exposure
    - CRI is technically still alpha and needs to graduate — maintaining dockershim
      reduces the incentive to stabilize the CRI API
  constraints:
    - Docker-built container images must continue to work unchanged — images
      conform to OCI standards and are runtime-agnostic
    - Migration path must provide sufficient transition time — deprecation to
      removal must span multiple Kubernetes release cycles
    - Windows container scenarios currently dependent on Docker must be fully
      supported in alternative CRI implementations before removal
    - E2E and Node e2e test frameworks must be CRI-generic and runtime-agnostic
      before dockershim can be removed
    - CRI API must graduate from alpha to stable (GA) before dockershim removal
      (KEP-2041)
    - The "kind" (Kubernetes IN Docker) development tool and similar Docker-based
      workflows must have documented migration paths
  assumptions:
    - containerd and CRI-O have reached sufficient production maturity to handle
      all Kubernetes workloads currently running on Docker
    - The community will maintain an external cri-dockerd shim for users who
      require continued Docker Engine integration
    - Major managed Kubernetes providers (GKE, EKS, AKS) will coordinate their
      runtime transitions with the deprecation timeline
    - The migration effort for cluster operators is manageable given the multi-
      release transition period (v1.20 deprecation to v1.24 removal)
    - The confusion caused by "Kubernetes is dropping Docker" messaging can be
      managed through clear documentation and community outreach
architecturally_significant_requirements:
  functional:
    - id: F-001
      description: >
        kubelet must communicate with container runtimes exclusively through the
        CRI gRPC API — no runtime-specific code paths may exist inside the
        kubelet binary
    - id: F-002
      description: >
        All OCI-compliant container images (including those built with Docker)
        must run unchanged on any CRI-compliant runtime
    - id: F-003
      description: >
        Container logging must work through CRI-standard log paths — no fallback
        to Docker-specific journald or legacy log providers
  non_functional:
    - id: NF-001
      description: >
        kubelet binary size and dependency footprint must decrease after
        dockershim removal by eliminating vendored Docker client libraries
    - id: NF-002
      description: >
        Container lifecycle operations (create, start, stop) must not degrade
        in latency when switching from dockershim to a CRI-native runtime
    - id: NF-003
      description: >
        The kubelet's CVE exposure surface must decrease by removing transitive
        dependencies from the docker/docker repository
alternatives:
  - name: Remove dockershim and require CRI-compliant runtimes
    description: |
      Remove the built-in dockershim from the kubelet codebase entirely and
      require all Kubernetes nodes to use container runtimes that implement
      the Container Runtime Interface (CRI) natively. The two primary CRI-
      compliant runtimes are **containerd** and **CRI-O**.

      This approach follows a multi-release deprecation plan:

      - **Step 1 (v1.20)**: Deprecate dockershim, mark as "maintenance mode."
        Print deprecation warnings in kubelet logs. Reject Docker-specific
        changes. Ensure tests are CRI-generic.
      - **Step 2 (v1.24)**: Build kubelet with the `dockerless` tag. Default
        builds no longer include dockershim support.
      - **Step 3 (v1.24)**: Delete dockershim source code after the grace
        period.

      The architectural change eliminates two unnecessary layers from the
      container lifecycle path. Instead of kubelet → dockershim → Docker
      Engine → containerd → runc, the path becomes kubelet → containerd/CRI-O
      → runc.

      ```mermaid
      graph TD
          subgraph "Before: Docker via Dockershim"
            A[kubelet] -->|CRI gRPC| B[dockershim]
            B -->|Docker API| C[Docker Engine]
            C --> D[containerd]
            D --> E[runc]
          end

          subgraph "After: Direct CRI"
            F[kubelet] -->|CRI gRPC| G{CRI Runtime}
            G -->|containerd| H1[runc]
            G -->|CRI-O| H2[runc]
            G -->|other| H3[kata / gVisor]
          end

          style B fill:#f66,stroke:#333,color:#000
          style C fill:#f66,stroke:#333,color:#000
          style G fill:#2d8,stroke:#333,color:#000
      ```

      **Runtime comparison:**

      | Runtime | CRI Native | CNCF Status | Used By | Architecture |
      |---------|:----------:|:-----------:|---------|:------------:|
      | containerd | ✅ | Graduated | GKE, EKS, Docker | Extracted from Docker |
      | CRI-O | ✅ | Incubating | OpenShift | Purpose-built for K8s |
      | Docker Engine | ❌ | N/A | Legacy clusters | Full platform (build+run) |

      For users who still require Docker Engine, the community-maintained
      **cri-dockerd** project (by Mirantis and Docker) provides an external
      CRI adapter, replacing the removed in-tree dockershim.
    pros:
      - Eliminates dockershim maintenance burden on SIG-Node — no more parallel
        updates for every CRI change
      - Removes two unnecessary layers from the container lifecycle path,
        reducing latency and complexity
      - Unblocks runtime-related enhancements (cgroups v2, user namespaces)
        that were incompatible with dockershim
      - Reduces kubelet binary size by eliminating vendored Docker client
        libraries and transitive dependencies
      - Aligns architecture with Kubernetes's own CRI standard — "Docker is not
        special and should be just a CRI implementation"
      - Enables runtime innovation (kata containers, gVisor, Firecracker) without
        Docker-specific assumptions
      - Reduces CVE exposure by eliminating transitive docker/docker dependencies
      - Incentivizes CRI API graduation from alpha to stable (GA)
      - containerd (extracted from Docker itself) and CRI-O are production-proven
        at massive scale (GKE, EKS, OpenShift)
    cons:
      - Massive migration impact — every Kubernetes cluster operator globally
        must verify and potentially change their container runtime
      - >-
        "Kubernetes is dropping Docker" narrative causes widespread confusion
        and alarm in the community
      - Docker-specific workflows (docker exec for debugging, docker logs,
        docker ps) no longer work directly on nodes
      - Additional binary required on nodes (cri-dockerd) for users who must
        continue using Docker Engine
      - Window of risk during migration — incorrect runtime configuration
        causes node failures
      - Managed Kubernetes providers must coordinate runtime transitions
        across millions of clusters
    estimated_cost: high
    risk: high
  - name: "Continue maintaining dockershim in-tree (status quo)"
    description: |
      Keep the dockershim code inside the kubelet codebase and continue
      maintaining it alongside the CRI interface. This preserves backward
      compatibility for all existing Docker-based clusters and avoids any
      migration pain.

      Under this approach, SIG-Node maintainers continue to update dockershim
      in parallel with every CRI change, maintain Docker-specific integrations
      (legacy log provider, journald driver, Docker cgroup management), and
      vendor the docker/docker client library into the kubelet binary.

      ```mermaid
      graph TD
          A[kubelet codebase] --> B[CRI Interface]
          A --> C[dockershim]
          B --> D[containerd]
          B --> E[CRI-O]
          C --> F[Docker Engine]

          A --> G{Maintenance Overhead}
          G --> H["Every CRI change<br/>requires dockershim update"]
          G --> I["Docker-specific<br/>integrations maintained"]
          G --> J["docker/docker vendored<br/>into kubelet"]

          style C fill:#f96,stroke:#333,color:#000
          style G fill:#f66,stroke:#333,color:#000
      ```

      The status quo means that Docker remains a "special" runtime with
      privileged access to kubelet internals, while all other runtimes must
      go through the standardized CRI interface. This architectural asymmetry
      creates ongoing friction and slows development velocity.
    pros:
      - Zero migration pain — no cluster operator action required
      - No community confusion about "dropping Docker"
      - Docker-specific debugging workflows (docker exec, docker ps) continue
        to work unchanged on nodes
      - No risk of misconfigured runtimes during migration
    cons:
      - Ongoing maintenance burden on SIG-Node for every CRI change
      - Docker-specific backdoor dependencies (legacyLogProvider, journald
        driver) continue to complicate kubelet code
      - Advanced features (cgroups v2, user namespaces) remain blocked by
        dockershim architecture limitations
      - kubelet binary remains bloated with vendored docker/docker dependencies
      - Docker treated as "special" runtime — architectural asymmetry violates
        the CRI abstraction principle
      - Less incentive for community to adopt native CRI runtimes, perpetuating
        the maintenance burden
      - Higher CVE exposure from transitive Docker dependencies
    estimated_cost: low
    risk: medium
    rejection_rationale: >
      Continuing to maintain dockershim in-tree perpetuates an unsustainable
      maintenance burden on SIG-Node. Every CRI enhancement requires parallel
      dockershim updates, Docker-specific integrations create backdoor
      dependencies in the kubelet, and advanced features (cgroups v2, user
      namespaces) remain blocked. The dockershim was always intended as a
      temporary solution — keeping it permanently violates the CRI abstraction
      principle and treats Docker as a privileged runtime despite mature
      alternatives being available.
  - name: Extract dockershim to an out-of-tree Kubernetes-maintained component
    description: |
      Move the dockershim code out of the kubelet repository into a separate
      Kubernetes-maintained repository (similar to the cloud provider
      extraction pattern). The kubelet would no longer contain dockershim, but
      the Kubernetes project would officially maintain the external shim as a
      first-class component.

      This approach partially reduces the kubelet's maintenance burden (no
      more vendored Docker dependencies in kubelet) while preserving an
      official Kubernetes-supported path for Docker Engine users.

      ```mermaid
      graph TD
          subgraph "Kubernetes Project"
            A[kubelet] -->|CRI gRPC| B[containerd / CRI-O]
            A -->|CRI gRPC| C[dockershim-external]
          end

          C -->|Docker API| D[Docker Engine]
          D --> E[containerd]
          E --> F[runc]

          subgraph "Maintained by SIG-Node"
            C
          end

          G{Outcome} --> H["✅ Dockershim out of kubelet"]
          G --> I["❌ SIG-Node still maintains shim"]
          G --> J["❌ Docker still 'special'"]

          style H fill:#2d8,stroke:#333,color:#000
          style I fill:#f66,stroke:#333,color:#000
          style J fill:#f66,stroke:#333,color:#000
      ```

      However, this approach still requires Kubernetes maintainers to own
      the shim's compatibility with Docker Engine across versions, handle
      CVEs in the shim, and deal with the fundamental non-CRI-compliance of
      Docker Engine. It also implicitly endorses Docker as a special runtime,
      reducing the incentive for users to migrate to CRI-native runtimes.
    pros:
      - Reduces kubelet binary size and dependency footprint
      - Preserves an official Kubernetes-supported Docker integration path
      - Follows the established cloud provider extraction pattern
      - Less disruptive migration — Docker users install an additional binary
        rather than changing their runtime entirely
    cons:
      - SIG-Node still bears the maintenance burden of the external shim
      - Docker Engine remains implicitly "special" — reduces CRI adoption
        incentive
      - Non-CRI-compliant Docker architecture persists — the fundamental
        problem is not solved
      - External shim must still vendor docker/docker and track Docker API
        changes across versions
      - Creates a long-term maintenance commitment for a component the
        community wants to move away from
      - Does not unblock cgroups v2 or user namespace support for Docker users
    estimated_cost: medium
    risk: medium
    rejection_rationale: >
      Extracting dockershim to an out-of-tree component maintained by the
      Kubernetes project would reduce kubelet complexity but not eliminate the
      core problem: SIG-Node would still be responsible for maintaining
      compatibility between Docker Engine's non-CRI API and the evolving CRI
      standard. This approach implicitly endorses Docker as a special runtime,
      reduces the incentive for users to migrate to CRI-native runtimes, and
      creates a long-term maintenance commitment for a fading architectural
      pattern. The community-maintained cri-dockerd (by Mirantis/Docker)
      achieves the same outcome without burdening Kubernetes maintainers.
  - name: Wait for Docker Engine to implement CRI natively
    description: |
      Defer the decision and wait for Docker Engine to add native CRI support,
      eliminating the need for a shim layer entirely. Under this approach,
      Docker would implement the CRI gRPC API directly, allowing the kubelet
      to communicate with Docker Engine the same way it communicates with
      containerd or CRI-O.

      ```mermaid
      graph TD
          A[kubelet] -->|CRI gRPC| B{Runtime with native CRI?}
          B -->|containerd| C[✅ Already CRI-native]
          B -->|CRI-O| D[✅ Already CRI-native]
          B -->|Docker Engine| E[❌ Not CRI-native]

          E --> F{Would Docker add CRI?}
          F -->|Likely not| G["Docker is a full platform<br/>(build, network, volumes)<br/>not just a runtime"]
          F -->|Hypothetical| H["Would duplicate containerd<br/>which Docker already uses"]

          style C fill:#2d8,stroke:#333,color:#000
          style D fill:#2d8,stroke:#333,color:#000
          style E fill:#f66,stroke:#333,color:#000
          style G fill:#f96,stroke:#333,color:#000
      ```

      However, Docker Engine is architecturally a full container platform
      encompassing image building, networking, storage volumes, and container
      execution. Adding CRI support would mean duplicating functionality
      already provided by containerd (which Docker Engine itself uses
      internally). Docker Inc. has shown no indication of implementing CRI
      natively, and the architectural mismatch makes this fundamentally
      unlikely.
    pros:
      - Zero migration effort if Docker were to implement CRI
      - No community confusion — Docker continues to "just work"
      - No additional binaries or components needed on nodes
    cons:
      - Docker Engine is architecturally incompatible with CRI — it is a full
        platform, not a focused container runtime
      - Docker Inc. has shown no indication of implementing CRI natively
      - Would require Docker to duplicate containerd functionality it already
        uses internally
      - Indefinite timeline — blocks all dockershim-related improvements
        while waiting for an event that may never occur
      - Does not address the existing maintenance burden in the interim
      - Kubernetes development remains blocked on a third party's roadmap
    estimated_cost: low
    risk: critical
    rejection_rationale: >
      Docker Engine is architecturally a full container platform, not a focused
      container runtime. Adding native CRI support would require Docker to
      duplicate the functionality already provided by containerd (which Docker
      itself uses internally). Docker Inc. has shown no indication of
      implementing CRI, and waiting indefinitely would block all runtime-related
      improvements in Kubernetes while depending on a third party's unplanned
      roadmap. The community cannot accept an indefinite deferral of critical
      architectural improvements.
decision:
  chosen_alternative: Remove dockershim and require CRI-compliant runtimes
  rationale: |
    - Dockershim was always intended as a temporary compatibility layer — its continued
      presence in the kubelet violated the CRI abstraction principle and treated Docker
      as a privileged runtime

    - The maintenance burden was concrete and growing: every CRI change required parallel
      dockershim updates, Docker-specific integrations created backdoor dependencies
      (legacyLogProvider, journald driver, Docker cgroup management), and the vendored
      docker/docker library bloated the kubelet binary

    - containerd (CNCF graduated, extracted from Docker itself) and CRI-O (CNCF
      incubating, purpose-built for Kubernetes) had proven production-ready at massive
      scale — GKE and EKS defaulted to containerd, OpenShift ran CRI-O in production
      since June 2019

    - Advanced container features blocked by dockershim (cgroups v2, user namespaces)
      were increasingly important for security and resource management

    - The multi-release deprecation timeline (v1.20 deprecation → v1.24 removal) provided
      18 months for migration — sufficient for even the largest enterprises

    - The community-maintained cri-dockerd (Mirantis/Docker) ensured that users who
      genuinely required Docker Engine had a supported external path without burdening
      Kubernetes maintainers

    - The "Docker is not special" principle aligned with Kubernetes's architectural
      philosophy: all runtimes should be treated equally through the CRI interface
  tradeoffs: |
    - Massive migration impact accepted because the 18-month transition period (v1.20 to
      v1.24) provided adequate time, and managed Kubernetes providers coordinated
      transitions for their customers

    - Community confusion from "Kubernetes is dropping Docker" narrative accepted and
      mitigated through extensive documentation, the "Don't Panic" FAQ blog post, and
      clear messaging that Docker-built images continue to work unchanged

    - Loss of Docker-specific debugging workflows (docker exec, docker ps, docker logs
      on nodes) accepted because crictl provides equivalent CRI-native debugging
      capabilities

    - Risk of migration-related node failures accepted because the deprecation warning
      in v1.20 provided early detection, and the migration guide documented all required
      configuration changes

    - Dependency on community-maintained cri-dockerd accepted because Mirantis committed
      to long-term maintenance as part of their Mirantis Kubernetes Engine (MKE) product
  decision_date: "2020-12-08"
  confidence: high
consequences:
  positive:
    - kubelet codebase simplified — Docker-specific code paths, backdoor integrations,
      and vendored dependencies eliminated
    - Runtime-related enhancements (cgroups v2, user namespaces) unblocked for all
      CRI-native runtimes
    - Reduced container lifecycle latency — direct kubelet → runtime path eliminates
      two unnecessary layers (dockershim + Docker Engine)
    - kubelet binary size reduced by eliminating vendored docker/docker repository
      and transitive dependencies
    - CVE exposure surface decreased — fewer vendored dependencies mean fewer
      potential vulnerabilities
    - Runtime innovation enabled — kata containers, gVisor, Firecracker can be
      integrated as first-class CRI runtimes without Docker assumptions
    - CRI API graduated from alpha to stable (GA), improving the container runtime
      ecosystem's maturity and standardization
    - >-
      "Docker is not special" principle established — all runtimes treated equally
      through the CRI interface
  negative:
    - Every Kubernetes cluster operator worldwide had to verify or change their
      container runtime configuration before upgrading to v1.24
    - >-
      "Kubernetes is dropping Docker" narrative caused widespread confusion and
      alarm, requiring extensive community outreach and documentation
    - Docker-specific node debugging workflows (docker exec, docker ps) replaced
      by less familiar crictl commands
    - Managed Kubernetes providers had to coordinate runtime transitions across
      millions of clusters on accelerated timelines
    - Users with custom Docker-specific tooling (scripts using docker socket,
      DaemonSets mounting /var/run/docker.sock) required additional migration work
    - The transition created a temporary period where different clusters in the
      same organization might use different runtimes, adding operational complexity
confirmation:
  description: |
    Dockershim was deprecated in Kubernetes v1.20 (December 2020) with warning
    logs in kubelet startup. The dockershim code was removed in Kubernetes v1.24
    (May 2022), with the kubelet built using the `dockerless` tag by default.

    Post-removal validation:
    - All major managed Kubernetes services (GKE, EKS, AKS) successfully
      transitioned to containerd as their default runtime
    - The CRI API graduated to stable (GA) in Kubernetes v1.26
    - cri-dockerd was released and maintained by Mirantis as a community-supported
      external adapter for Docker Engine users
    - No regressions in container lifecycle operations were reported after the
      transition to CRI-native runtimes
    - The "kind" project migrated from Docker-via-dockershim to containerd
      without issues
  artifact_ids:
    - "https://github.com/kubernetes/enhancements/tree/master/keps/sig-node/2221-remove-dockershim"
    - "https://kubernetes.io/blog/2020/12/02/dockershim-faq/"
    - "https://kubernetes.io/blog/2022/02/17/dockershim-faq/"
    - "https://github.com/Mirantis/cri-dockerd"
    - "https://kubernetes.io/docs/tasks/administer-cluster/migrating-from-dockershim/"
    - "Kubernetes v1.24 release notes — dockershim removal"
dependencies:
  internal:
    - CRI API graduation to stable (GA) — KEP-2041
    - E2E and Node e2e test framework updated to be CRI-generic
    - kubelet `dockerless` build tag for conditional compilation
    - Windows container support in alternative CRI runtimes
  external:
    - containerd — CNCF graduated container runtime
    - CRI-O — CNCF incubating container runtime
    - cri-dockerd — community-maintained external Docker CRI adapter (Mirantis)
    - OCI Runtime Specification — ensures container image compatibility
    - crictl — CRI-compatible debugging CLI tool

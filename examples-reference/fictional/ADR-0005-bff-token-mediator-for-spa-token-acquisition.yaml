adr:
  id: ADR-0005-bff-token-mediator-for-spa-token-acquisition
  title: Use the Backend-for-Frontend token mediator pattern over direct SPA-to-AS authorization for single-page applications
  y_statement: >-
    In the context of single-page application (SPA) OAuth 2.1 integration, facing the inability to securely store tokens
    in browser environments and the risk of XSS-based token exfiltration, we decided for the Backend-for-Frontend (BFF)
    token mediator pattern and neglected direct SPA-to-authorization-server flows with in-memory tokens and service
    worker token caches with encrypted storage, to achieve server-side token storage with httpOnly/Secure/SameSite
    cookie-based session binding that eliminates browser-accessible token material, accepting the operational overhead
    of deploying and scaling a BFF service per SPA and increased backend latency for token exchange, because the BFF
    pattern is the only approach that fully removes tokens from the browser attack surface while maintaining OAuth 2.1
    compliance per the Security BCP.
  status: accepted
  created_at: "2026-02-01T10:00:00Z"
  last_modified: "2026-02-20T09:00:00Z"
  version: "1.0"
  schema_version: "1.0.0"
  project: Customer Portal — SPA Authentication Architecture
  component: SPA Token Acquisition Pattern
  tags:

adr:
  id: ADR-0002-reference-tokens-over-jwt-for-gateway-introspection
  title: Use opaque reference tokens with introspection over self-contained JWTs for API gateway authorization
  y_statement: >-
    In the context of the API gateway authorization layer, facing the need for immediate token revocation capability and
    minimal gateway-side cryptographic complexity, we decided for opaque reference tokens with OAuth 2.0 Token
    Introspection (RFC 7662) and neglected self-contained JWTs with short lifetimes and JWTs with a distributed Redis
    deny-list, to achieve sub-second revocation, zero JWKS key management at the gateway, and simplified PII handling by
    keeping claims server-side, accepting the per-request introspection latency overhead and the authorization server
    becoming a critical-path dependency, because reference tokens provide the strongest revocation guarantees with the
    simplest gateway implementation while keeping PII out of network-traversing tokens.
  status: accepted
  created_at: "2026-01-15T10:00:00Z"
  last_modified: "2026-02-01T16:00:00Z"
  version: "1.0"
  schema_version: "1.0.0"

# ADR-0006: Adopt Privileged Access Management with Just-in-Time Elevation
# Organization: NovaTrust Financial Services
# Department: Identity and Access Management

adr:
  id: "ADR-0006"
  title: "Adopt privileged access management with just-in-time elevation for production systems"
  status: "accepted"
  created_at: "2026-02-10T08:00:00Z"
  last_modified: "2026-02-28T14:00:00Z"
  version: "1.0"
  project: "Privileged Access Security Programme"
  component: "Privileged Access Management"
  tags: ["pam", "jit", "privileged-access", "least-privilege", "compliance"]
  priority: "high"
  decision_type: "security"

authors:
  - name: "Marcus Chen"
    role: "Head of IAM"
    email: "marcus.chen@novatrust.example.com"

decision_owner:
  name: "Jonas Eriksen"
  role: "CISO"
  email: "jonas.eriksen@novatrust.example.com"


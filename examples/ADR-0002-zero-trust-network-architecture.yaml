context:
  summary: >
    NovaTrust's internal network relies on perimeter-based security with flat network
    segments. The 2025 penetration test demonstrated that once an attacker bypasses the
    perimeter, lateral movement is trivial. DORA Article 9 requires ICT risk management
    measures including network segmentation and encryption of data in transit. With the
    move to Kubernetes-based microservices, the attack surface has grown significantly.
    We need to adopt a Zero Trust model where every service-to-service call is
    authenticated, authorized, and encrypted regardless of network location.
  business_drivers:
    - "DORA ICT risk management compliance (Article 9)"
    - "2025 pentest findings: critical lateral movement risk"
    - "Cyber insurance premium reduction (estimated 20% with Zero Trust attestation)"
    - "Board-level mandate for security posture improvement"
  technical_drivers:
    - "Kubernetes microservices require pod-level identity"
    - "Flat network allows unrestricted east-west traffic"
    - "No centralized service-to-service authentication today"
    - "Need for observability into inter-service communication patterns"
  constraints:
    - "Must support hybrid: on-premises datacenter + cloud Kubernetes"
    - "Cannot disrupt payment processing during rollout"
    - "Budget approved for 2-year implementation programme"
  assumptions:
    - "SPIFFE/SPIRE can serve as workload identity foundation"
    - "Istio service mesh is compatible with existing Kubernetes clusters"
    - "Legacy on-premises services can be proxied via mesh gateways"

requirements:
  functional:
    - id: "F-001"
      description: "Every service-to-service call must present a verifiable workload identity (SVID)"
    - id: "F-002"
      description: "Authorization policies enforced per-service based on identity, not network location"
    - id: "F-003"
      description: "Service communication patterns visible in centralized observability platform"
  non_functional:
    - id: "NF-001"
      description: "mTLS overhead < 2ms per request at p99"
    - id: "NF-002"
      description: "Certificate rotation without service restarts"
    - id: "NF-003"
      description: "Policy evaluation latency < 5ms per request"

alternatives:
  - name: "Istio service mesh with SPIFFE identity"
    summary: "Deploy Istio as service mesh with SPIRE for workload identity issuance"
    pros:
      - "Automatic mTLS between all pods"
      - "SPIFFE provides portable workload identity (SVIDs)"
      - "Rich L7 authorization policies"
      - "Built-in observability (traces, metrics, access logs)"
    cons:
      - "Operational complexity of mesh control plane"
      - "Istio version upgrades require careful coordination"
      - "sidecar proxy adds latency and resource overhead"
    estimated_cost: "high"
    risk: "medium"

  - name: "Network micro-segmentation with firewall rules"
    summary: "Implement VLAN-based micro-segmentation with next-gen firewall policies"
    pros:
      - "Familiar technology for network team"
      - "No application-level changes required"
    cons:
      - "Does not provide service-level identity or authentication"
      - "Static rules cannot adapt to dynamic Kubernetes workloads"
      - "No encryption of east-west traffic"
      - "Insufficient for DORA Article 9 compliance"
    estimated_cost: "medium"
    risk: "high"

  - name: "Application-level mTLS without mesh"
    summary: "Each service manages its own TLS certificates and authentication"
    pros:
      - "No infrastructure dependency on service mesh"
      - "Teams control their own security posture"
    cons:
      - "Inconsistent implementation across 80+ services"
      - "Certificate management burden distributed to every team"
      - "No centralized policy enforcement or observability"
      - "High risk of misconfiguration"
    estimated_cost: "medium"
    risk: "high"

decision:
  chosen_alternative: "Istio service mesh with SPIFFE identity"
  rationale:
    - "Only alternative providing both authentication (mTLS) and authorization (L7 policies) at the infrastructure level"
    - "SPIFFE workload identity is cloud-native and portable across hybrid environments"
    - "Centralized policy enforcement eliminates risk of individual team misconfiguration"
    - "Built-in observability satisfies DORA incident detection requirements"
    - "Sidecar proxy model requires zero application code changes for mTLS"
  tradeoffs:
    - "Higher infrastructure cost (sidecar resource overhead ~10% CPU per pod)"
    - "Istio control plane is an additional critical dependency"
    - "Team must develop deep Istio expertise"
  decision_date: "2026-01-31"

consequences:
  positive:
    - "Every service call authenticated and encrypted by default"
    - "Full visibility into service communication topology"
    - "DORA Article 9 compliance for network security controls"
    - "Foundation for future capabilities: canary deployments, traffic shifting, fault injection"
  negative:
    - "10% CPU overhead per pod for sidecar proxies"
    - "Istio upgrade cycles add operational burden"
    - "2-year migration timeline for full coverage"
  security_implications:
    data_classification: "restricted"
    encryption:
      at_rest: false
      in_transit: true
      key_management: "SPIRE-managed X.509 SVIDs with automatic rotation (TTL: 1 hour)"
    access_control:
      iam_integration: true
      least_privilege: true
    audit:
      audit_logging: true
      retention: "5 years"
  compliance_implications:
    regulatory_impact:
      dora: "Satisfies Article 9 ICT risk management for network segmentation and encryption"
      pci_dss: "Supports requirement 4 (encrypt transmission) and requirement 7 (restrict access)"
    required_controls:
      - "mTLS for all service-to-service communication"
      - "Workload identity verification before authorization"
      - "Deny-by-default network policies"
      - "Quarterly access policy reviews"
  operational_implications:
    monitoring:
      - "Istio control plane health (istiod availability)"
      - "Certificate issuance and rotation success rate"
      - "mTLS handshake failure rate"
      - "Authorization policy deny rate"
    runbooks:
      - "Istio control plane failover"
      - "Emergency policy bypass for incident response"
      - "SPIRE server recovery procedure"
    staffing:
      - "2 platform engineers for mesh operations"
      - "1 security engineer for policy management"

risk_assessment:
  risks:
    - id: "R-001"
      description: "Istio control plane outage causes service communication failure"
      likelihood: "low"
      impact: "critical"
      mitigation:
        - "Multi-replica istiod deployment across availability zones"
        - "Envoy sidecar continues with cached config during control plane outage"
        - "Automated failover with < 30 second recovery"
    - id: "R-002"
      description: "Overly permissive authorization policies negate Zero Trust benefits"
      likelihood: "medium"
      impact: "high"
      mitigation:
        - "Policy-as-code in Git with mandatory review"
        - "Automated policy auditing tool runs nightly"
        - "Quarterly access reviews by security team"
    - id: "R-003"
      description: "Legacy on-premises services cannot participate in mesh"
      likelihood: "medium"
      impact: "medium"
      mitigation:
        - "Istio mesh gateway for legacy ingress with mTLS termination"
        - "Gradual migration plan for legacy services"
  residual_risk: "medium"

deployment:
  rollout_plan:
    phases:
      - name: "Foundation"
        criteria: "SPIRE deployed; Istio control plane running; 5 non-critical services onboarded"
        duration_days: 60
      - name: "Internal Services"
        criteria: "All internal microservices (80+) in mesh; deny-by-default policies active"
        duration_days: 180
      - name: "Payment Critical Path"
        criteria: "Payment processing services in mesh; performance validated under load"
        duration_days: 90
      - name: "Legacy Integration"
        criteria: "On-premises services proxied via mesh gateways; full coverage achieved"
        duration_days: 180
  testing:
    unit_tests: true
    integration_tests: true
    performance_tests:
      qps_target: 50000
      p99_latency_ms: 5
    compliance_tests:
      - "mTLS enforcement verification (no plaintext east-west traffic)"
      - "Deny-by-default policy audit"
      - "Certificate rotation under load"
  rollback_plan:
    criteria: "Service error rate > 2% attributable to mesh or mTLS handshake timeout > 100ms at p99"
    steps:
      - "Disable Istio sidecar injection for affected namespaces"
      - "Revert to previous network policies"
      - "Conduct root cause analysis"
      - "Re-enable after fix validated in staging"

monitoring:
  metrics:
    - name: "mtls_handshake_failure_rate_percent"
      threshold_warning: 0.1
      threshold_critical: 1.0
    - name: "istiod_availability_percent"
      threshold_warning: 99.99
      threshold_critical: 99.95
    - name: "policy_evaluation_latency_p99_ms"
      threshold_warning: 3
      threshold_critical: 10
  alerts:
    - "PagerDuty: platform-on-call for control plane issues"
    - "Slack: #zero-trust-ops for policy deny anomalies"
  sla:
    availability_target: "99.99%"
    rpo: "<= 0 (stateless mesh proxy)"
    rto: "<= 5 minutes (sidecar restart)"

dependencies:
  internal:
    - "Kubernetes platform team"
    - "SPIRE identity infrastructure"
    - "Centralized observability (Grafana, Jaeger)"
  external:
    - "Istio open-source community"
    - "Envoy proxy project"


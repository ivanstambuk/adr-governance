  id: "ADR-0002"
  title: "Adopt Zero Trust Network Architecture for internal service communication"
  status: "accepted"
  created_at: "2026-01-15T10:00:00Z"
  last_modified: "2026-02-01T16:00:00Z"
  version: "1.0"

# ADR-0001: Use DPoP over mTLS for Sender-Constrained Access Tokens
# Organization: NovaTrust Financial Services
# Department: Identity and Access Management

adr:
  id: "ADR-0001"
  title: "Use DPoP over mTLS as the sender-constraining mechanism for OAuth 2.1 access tokens"
  status: "accepted"
  created_at: "2026-01-10T09:00:00Z"

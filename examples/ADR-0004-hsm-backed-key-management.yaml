# ADR-0004: Implement HSM-Backed Key Management
# Organization: NovaTrust Financial Services
# Department: Identity and Access Management

adr:
  id: "ADR-0004"
  title: "Implement HSM-backed key management for all cryptographic operations"
  status: "accepted"
  created_at: "2025-11-20T09:00:00Z"
  last_modified: "2025-12-20T10:00:00Z"
  version: "1.0"
  project: "Cryptographic Infrastructure Programme"
  component: "Key Management Service"
  tags: ["hsm", "cryptography", "key-management", "pkcs11", "compliance"]
  priority: "critical"
  decision_type: "technology"

authors:
  - name: "Tomasz Kowalski"
    role: "Network Security Architect"
    email: "tomasz.kowalski@novatrust.example.com"

decision_owner:
  name: "Jonas Eriksen"
  role: "CISO"
  email: "jonas.eriksen@novatrust.example.com"

reviewers:
  - name: "Elena Vasquez"
    role: "IAM Architect"
    email: "elena.vasquez@novatrust.example.com"

approvals:
  - name: "Jonas Eriksen"
    role: "CISO"
    approved_at: "2025-12-18T14:00:00Z"
    signature_id: "sig-hsm-001"

context:
  summary: >
    NovaTrust's cryptographic keys for token signing, TLS termination, and data
    encryption are stored in software keystores. A recent audit found private keys
    accessible to all cluster administrators. PCI DSS 3.5 and eIDAS QSCD
    requirements mandate hardware-protected key storage.
  business_drivers:
    - "PCI DSS 4.0 audit finding: key storage non-compliant"
    - "eIDAS QSCD requirement for qualified electronic signatures"
    - "Insurance underwriter requires HSM attestation"
  technical_drivers:
    - "Software keystores allow key extraction by administrators"
    - "No centralized key lifecycle management"
    - "Need for PKCS#11 interface for PingFederate"
  constraints:
    - "HSM must be deployable in EU-only datacenters"
    - "Must support PKCS#11, JCE, and KMIP interfaces"
    - "Budget: max 200K EUR initial + 80K EUR/year operational"
  assumptions:
    - "Cloud HSM offerings meet FIPS 140-2 Level 3"
    - "PingFederate supports PKCS#11 for signing key storage"

requirements:
  functional:
    - id: "F-001"
      description: "All token signing keys stored exclusively in HSM"
    - id: "F-002"
      description: "Automated key rotation with configurable schedules"
  non_functional:
    - id: "NF-001"
      description: "Signing operation latency < 10ms at p99"
    - id: "NF-002"
      description: "HSM cluster availability 99.999%"

alternatives:
  - name: "Cloud provider HSM"
    summary: "Managed HSM service with FIPS 140-2 Level 3"
    pros:
      - "FIPS 140-2 Level 3 certified"
      - "Managed infrastructure with provider SLA"
      - "PKCS#11 and JCE interfaces"
    cons:
      - "Cloud provider dependency"
      - "Limited visibility into firmware"
    estimated_cost: "medium"
    risk: "low"

  - name: "On-premises HSM appliance"
    summary: "Physical HSM appliances in NovaTrust datacenters"
    pros:
      - "Full physical control over key material"
      - "No cloud dependency"
    cons:
      - "High capital expenditure (150K EUR+)"
      - "Hardware maintenance responsibility"
    estimated_cost: "high"
    risk: "low"

  - name: "Software vault (HashiCorp Vault)"
    summary: "Software-based transit secrets engine"
    pros:
      - "Lower cost"
      - "Flexible deployment"
    cons:
      - "Keys extractable from memory"
      - "Does not satisfy FIPS 140-2 Level 3"
      - "Regulatory non-compliance"
    estimated_cost: "low"
    risk: "high"

decision:
  chosen_alternative: "Cloud provider HSM"
  rationale:
    - "Meets FIPS 140-2 Level 3 with provider certification"
    - "Lower TCO than on-premises appliances"
    - "EU-only region satisfies data sovereignty"
    - "PKCS#11 compatible with PingFederate"
  tradeoffs:
    - "Key material in cloud provider hardware"
    - "Dependent on provider for firmware patches"
  decision_date: "2025-12-18"

consequences:
  positive:
    - "All keys protected by certified hardware"
    - "PCI DSS 4.0 and eIDAS QSCD compliance"
    - "Centralized key lifecycle management"
  negative:
    - "Ongoing cloud HSM cost (~60K EUR/year)"
    - "Provider dependency for key operations"
  security_implications:
    data_classification: "restricted"
    encryption:
      at_rest: true
      in_transit: true
      key_management: "HSM-backed FIPS 140-2 Level 3; keys never leave HSM"
    access_control:
      iam_integration: true
      least_privilege: true
    audit:
      audit_logging: true
      retention: "7 years"
  compliance_implications:
    regulatory_impact:
      pci_dss: "Satisfies requirement 3.5"
      eidas: "Cloud HSM as QSCD"
    required_controls:
      - "Dual-control key ceremony"
      - "M-of-N quorum for key operations"
      - "Annual key rotation"
  operational_implications:
    monitoring:
      - "HSM cluster health"
      - "Key operation latency"
      - "Key expiration alerts"
    runbooks:
      - "HSM cluster failover"
      - "Key ceremony procedure"
      - "Emergency key revocation"
    staffing:
      - "1 security engineer for HSM administration"

risk_assessment:
  risks:
    - id: "R-001"
      description: "Cloud HSM service outage"
      likelihood: "low"
      impact: "critical"
      mitigation:
        - "Multi-AZ HSM cluster"
        - "Contractual SLA with penalties"
  residual_risk: "low"

deployment:
  rollout_plan:
    phases:
      - name: "HSM Provisioning"
        criteria: "HSM cluster deployed and PKCS#11 accessible"
        duration_days: 14
      - name: "Key Migration"
        criteria: "All production signing keys in HSM"
        duration_days: 30
  testing:
    unit_tests: true
    integration_tests: true
    performance_tests:
      qps_target: 20000
      p99_latency_ms: 10
    compliance_tests:
      - "FIPS 140-2 certificate validation"
      - "Key non-exportability verification"
  rollback_plan:
    criteria: "HSM latency > 50ms or availability < 99.9%"
    steps:
      - "Revert to software keystore backup"
      - "Investigate with provider support"

monitoring:
  metrics:
    - name: "hsm_operation_latency_p99_ms"
      threshold_warning: 5
      threshold_critical: 20
    - name: "hsm_availability_percent"
      threshold_warning: 99.999
      threshold_critical: 99.99
  alerts:
    - "PagerDuty: security-on-call for HSM issues"
  sla:
    availability_target: "99.999%"
    rpo: "<= 0"
    rto: "<= 2 minutes"

dependencies:
  internal:
    - "PingFederate (ADR-0003)"
    - "Kubernetes cluster"
  external:
    - "Cloud provider HSM service"

related_adrs:
  - id: "ADR-0003"
    title: "Select PingFederate as enterprise identity provider"
    relationship: "depends_on"

references:

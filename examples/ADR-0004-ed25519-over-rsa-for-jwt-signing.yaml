adr:
  id: ADR-0004
  title: Use Ed25519 (EdDSA) over RSA-2048 for JWT and assertion signing keys
  summary: Migrate from RSA-2048 (RS256) to Ed25519 (EdDSA) for all JWT/JWS signing to achieve 20x throughput improvement, eliminating the PingFederate CPU bottleneck.
  status: accepted
  created_at: "2025-11-20T09:00:00Z"
  last_modified: "2025-12-20T10:00:00Z"
  version: "1.0"
  schema_version: "1.0.0"

# ADR-0004: Use Ed25519 over RSA-2048 for JWT Signing Keys
# Organization: NovaTrust Financial Services
# Department: Identity and Access Management

adr:
  id: "ADR-0004"
  title: "Use Ed25519 (EdDSA) over RSA-2048 for JWT and assertion signing keys"
  status: "accepted"

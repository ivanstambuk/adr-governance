  id: "ADR-0001"
  title: "Adopt OAuth 2.1 as the standard API authorization framework"
  status: "accepted"
  created_at: "2026-01-10T09:00:00Z"
  last_modified: "2026-01-25T14:30:00Z"
  version: "1.0"
  project: "Enterprise API Gateway Modernization"

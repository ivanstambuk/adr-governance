# ADR-0005: Use Backend-for-Frontend Token Mediator for SPA Token Acquisition
# Organization: NovaTrust Financial Services
# Department: Identity and Access Management

adr:
  id: "ADR-0005"
  title: "Use the Backend-for-Frontend token mediator pattern over direct SPA-to-AS authorization for single-page applications"
  status: "accepted"
  created_at: "2026-02-01T10:00:00Z"

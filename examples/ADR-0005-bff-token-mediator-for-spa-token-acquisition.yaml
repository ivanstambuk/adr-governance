adr:
  id: ADR-0005
  title: Use the Backend-for-Frontend token mediator pattern over direct SPA-to-AS authorization for single-page applications
  summary: Adopt the BFF/Token Mediator pattern so OAuth tokens never reach the browser, eliminating XSS-based token theft for the banking portal.
  status: accepted
  created_at: "2026-02-01T10:00:00Z"
  last_modified: "2026-02-20T09:00:00Z"
  version: "1.0"
  schema_version: 1.0.0

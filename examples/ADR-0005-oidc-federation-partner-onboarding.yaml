# ADR-0005: Adopt OIDC Federation for B2B Partner Onboarding
# Organization: NovaTrust Financial Services
# Department: Identity and Access Management

adr:
  id: "ADR-0005"
  title: "Adopt OpenID Connect Federation for automated B2B partner onboarding"
  status: "proposed"
  created_at: "2026-02-01T10:00:00Z"
  last_modified: "2026-02-15T09:00:00Z"
  version: "0.1"
  project: "Partner Integration Platform"
  component: "Federation Layer"
  tags: ["oidc-federation", "b2b", "trust-chain", "partner-onboarding"]
  priority: "high"
  decision_type: "technology"

authors:
  - name: "Elena Vasquez"
    role: "IAM Architect"
    email: "elena.vasquez@novatrust.example.com"

decision_owner:
  name: "Marcus Chen"
  role: "Head of IAM"
  email: "marcus.chen@novatrust.example.com"

reviewers:
  - name: "Partner Integration Lead"
    role: "Business Development"
    email: "partners@novatrust.example.com"

approvals:
  - name: "Marcus Chen"
    role: "Head of IAM"
    approved_at: null
    signature_id: null

context:
  summary: >
    NovaTrust currently onboards partner banks for federated SSO via manual SAML
    metadata exchange. This process takes 4-6 weeks per partner and requires custom
    configuration per integration. OpenID Connect Federation (draft-ietf-oauth-sd-jwt-vc)
    offers automated trust chain resolution, reducing onboarding to hours via
    entity statements and trust marks. With 50+ partner banks in the pipeline,
    the manual process will not scale.
  business_drivers:
    - "50+ partner banks in onboarding pipeline for next 18 months"
    - "Current manual process costs ~40 engineering hours per partner"
    - "Competitive pressure: rival platforms offer self-service federation"
  technical_drivers:
    - "SAML metadata exchange is manual and error-prone"
    - "No automated trust verification mechanism"
    - "OIDC Federation provides cryptographic trust chains"
  constraints:
    - "Partners may not all support OIDC Federation initially"
    - "Must maintain SAML fallback for legacy partners"
  assumptions:
    - "PingFederate will add OIDC Federation support in 2026 roadmap"
    - "At least 10 early-adopter partners willing to pilot"

requirements:
  functional:
    - id: "F-001"
      description: "Automated partner discovery via entity statements"
    - id: "F-002"
      description: "Trust chain verification without manual metadata exchange"
  non_functional:
    - id: "NF-001"
      description: "Partner onboarding from days to under 1 hour"
    - id: "NF-002"
      description: "Trust chain resolution < 2 seconds"

alternatives:
  - name: "OIDC Federation with trust anchor"
    summary: "Implement OIDC Federation protocol with NovaTrust as trust anchor"
    pros:
      - "Automated trust establishment via entity statements"
      - "Cryptographic trust chain eliminates manual key exchange"
      - "Self-service partner onboarding portal possible"
    cons:
      - "OIDC Federation spec still maturing"
      - "Limited IdP vendor support currently"
    estimated_cost: "medium"
    risk: "medium"

  - name: "Enhanced SAML metadata exchange automation"
    summary: "Automate SAML metadata exchange via MDUI pipeline"
    pros:
      - "Uses existing SAML infrastructure"
      - "Partners already familiar with SAML"
    cons:
      - "Still requires bilateral metadata exchange"
      - "No automated trust verification"
      - "Does not solve fundamental scalability problem"
    estimated_cost: "low"
    risk: "low"

decision:
  chosen_alternative: "OIDC Federation with trust anchor"
  rationale:
    - "Only solution that enables self-service automated onboarding"
    - "Cryptographic trust chains align with eIDAS trust framework direction"
    - "Positions NovaTrust as industry leader in federation automation"
  tradeoffs:
    - "Spec maturity risk — may need to adapt to breaking changes"
    - "SAML fallback needed for 2-3 years during partner adoption"
  decision_date: "2026-02-15"

consequences:
  positive:
    - "Partner onboarding reduced from weeks to hours"
    - "Self-service portal for partner registration"
    - "Automated trust chain verification"
  negative:
    - "Dual federation stack (OIDC Fed + SAML) during transition"
    - "Early adopter risk with evolving specification"
  security_implications:
    data_classification: "confidential"
    encryption:
      at_rest: true
      in_transit: true
      key_management: "Trust anchor signing key in HSM (ADR-0004)"
    access_control:
      iam_integration: true
      least_privilege: true
    audit:
      audit_logging: true
      retention: "7 years"
  compliance_implications:
    regulatory_impact:
      eidas: "Aligns with eIDAS 2.0 trust service interoperability goals"
    required_controls:
      - "Trust anchor key protected by HSM"
      - "Entity statement signature verification"
  operational_implications:
    monitoring:
      - "Trust chain resolution success rate"
      - "Partner entity statement freshness"
    runbooks:
      - "Trust anchor key rotation"
      - "Partner entity revocation"
    staffing:
      - "0.5 FTE IAM engineer for federation operations"

risk_assessment:
  risks:
    - id: "R-001"
      description: "OIDC Federation specification changes break implementation"
      likelihood: "medium"
      impact: "medium"
      mitigation:
        - "Active participation in IETF working group"
        - "Abstraction layer to isolate spec changes"
  residual_risk: "medium"

deployment:
  rollout_plan:
    phases:
      - name: "Pilot"
        criteria: "5 partner banks onboarded via OIDC Federation"
        duration_days: 90
      - name: "General Availability"
        criteria: "Self-service portal live; 20+ partners onboarded"
        duration_days: 180
  testing:
    unit_tests: true
    integration_tests: true
    performance_tests:
      qps_target: 100
      p99_latency_ms: 2000
    compliance_tests:
      - "Trust chain verification end-to-end"
  rollback_plan:
    criteria: "Trust chain resolution failure rate > 5%"
    steps:
      - "Revert to SAML metadata exchange for affected partners"
      - "Investigate and fix trust anchor configuration"

monitoring:
  metrics:
    - name: "trust_chain_resolution_success_percent"
      threshold_warning: 99
      threshold_critical: 95
  alerts:
    - "Slack: #federation-ops for resolution failures"
  sla:
    availability_target: "99.9%"
    rpo: "<= 1 hour"
    rto: "<= 30 minutes"

dependencies:
  internal:
    - "PingFederate (ADR-0003)"
    - "HSM infrastructure (ADR-0004)"
  external:
    - "Partner bank IdPs"

related_adrs:
  - id: "ADR-0001"
    title: "Adopt OAuth 2.1 for API authorization"
    relationship: "related"
  - id: "ADR-0003"
    title: "Select PingFederate as enterprise IdP"
    relationship: "depends_on"
  - id: "ADR-0004"
    title: "Implement HSM-backed key management"
    relationship: "depends_on"


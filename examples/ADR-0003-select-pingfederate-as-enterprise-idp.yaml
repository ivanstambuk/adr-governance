context:
  summary: >
    NovaTrust operates three separate identity systems: an on-premises ADFS for workforce
    SSO, a custom-built OIDC provider for customer-facing apps, and ad-hoc SAML integrations
    for partner banks. This fragmentation causes high operational cost, inconsistent security
    policies, and painful onboarding. We need a single enterprise-grade IdP that supports
    OIDC, SAML 2.0, workforce and CIAM use cases, and advanced authentication journeys
    including step-up and adaptive MFA.
  business_drivers:
    - "Reduce IdP operational cost (currently €800K/year across 3 systems)"
    - "Unified security policy enforcement across workforce, customer, and partner domains"
    - "Partner federation onboarding reduced from months to days"
    - "Support eIDAS 2.0 / EUDI Wallet integration roadmap"
  technical_drivers:
    - "Need for orchestrated authentication journeys (trees/flows)"
    - "Support for OIDC, SAML 2.0, and WS-Federation"
    - "Adaptive MFA with risk-based step-up"
    - "SDK availability for mobile and web applications"
  constraints:
    - "Must support on-premises deployment (data sovereignty)"
    - "Must integrate with existing Active Directory and LDAP stores"
    - "3-year enterprise license commitment maximum"
  assumptions:
    - "PingFederate evaluation licenses are available for PoC"
    - "Existing ADFS claims can be mapped to OIDC scopes"
    - "Custom OIDC provider can be decommissioned within 18 months"

requirements:
  functional:
    - id: "F-001"
      description: "Support OIDC Authorization Code + PKCE for all relying parties"
    - id: "F-002"
      description: "Support SAML 2.0 IdP-initiated and SP-initiated SSO"
    - id: "F-003"
      description: "Orchestrated authentication journeys with conditional MFA"
  non_functional:
    - id: "NF-001"
      description: "Authentication latency p95 < 500ms including MFA"
    - id: "NF-002"
      description: "99.99% availability with active-active clustering"
    - id: "NF-003"
      description: "Support for 500K concurrent sessions"

alternatives:
  - name: "PingFederate"
    summary: "Enterprise IdP from Ping Identity with advanced authentication orchestration"
    pros:
      - "Mature authentication tree/journey engine"
      - "Supports OIDC, SAML 2.0, WS-Federation natively"
      - "Active-active clustering for high availability"
      - "Strong financial services customer base with regulatory awareness"
      - "On-premises and cloud deployment options"
    cons:
      - "Higher license cost than open-source alternatives"
      - "Proprietary journey scripting requires vendor-specific skills"
    estimated_cost: "high"
    risk: "low"

  - name: "Keycloak"
    summary: "Open-source IdP with OIDC and SAML support"
    pros:
      - "No license cost"
      - "Active community and extensive documentation"
      - "Kubernetes-native deployment with operator"
    cons:
      - "Limited enterprise support (Red Hat SSO EOL concerns)"
      - "Authentication flow customization less mature than PingFederate"
      - "No built-in adaptive MFA or risk engine"
      - "Scaling to 500K sessions requires significant tuning"
    estimated_cost: "low"
    risk: "medium"

  - name: "Azure AD B2C"
    summary: "Microsoft's cloud CIAM solution"
    pros:
      - "Native Azure integration"
      - "Managed service with no infrastructure overhead"
    cons:
      - "Cloud-only; does not meet on-premises data sovereignty requirement"
      - "Limited authentication journey customization"
      - "Vendor lock-in to Microsoft ecosystem"
      - "Does not support SAML IdP-initiated SSO well"
    estimated_cost: "medium"
    risk: "high"

decision:
  chosen_alternative: "PingFederate"
  rationale:
    - "Only alternative satisfying both on-premises deployment and advanced journey orchestration"
    - "Proven in financial services with relevant regulatory certifications"
    - "Active-active clustering meets 99.99% availability target"
    - "Authentication trees enable complex step-up and adaptive MFA flows"
    - "SAML 2.0 and OIDC parity simplifies partner federation"
  tradeoffs:
    - "Higher annual license cost (~€250K/year vs €0 for Keycloak)"
    - "Vendor lock-in for authentication journey definitions"
    - "Proprietary administration console requires training"
  decision_date: "2025-12-10"

consequences:
  positive:
    - "Single IdP for workforce, customer, and partner authentication"
    - "Operational cost reduction from €800K to ~€350K/year (including license)"
    - "Consistent security policies across all authentication domains"
    - "Foundation for eIDAS 2.0 / EUDI Wallet relying party integration"
  negative:
    - "18-month migration project to decommission ADFS and custom OIDC"
    - "Team needs PingFederate training and certification"
    - "Vendor dependency for core authentication infrastructure"
  security_implications:
    data_classification: "restricted"
    encryption:
      at_rest: true
      in_transit: true
      key_management: "HSM-backed signing keys for SAML assertions and OIDC tokens"
    access_control:
      iam_integration: true
      least_privilege: true
    audit:
      audit_logging: true
      retention: "7 years"
  compliance_implications:
    regulatory_impact:
      eidas: "PingFederate supports SAML and OIDC profiles required for eIDAS trust framework"
      gdpr: "On-premises deployment ensures data residency; consent management via scopes"
      dora: "Centralized IdP simplifies ICT third-party risk management"
    required_controls:
      - "HSM-backed signing for all assertions and tokens"
      - "Session idle timeout 15 minutes for workforce; 30 minutes for customers"
      - "Brute-force protection and account lockout policies"
      - "Full authentication audit trail with correlation IDs"
  operational_implications:
    monitoring:
      - "Authentication success/failure rate by relying party"
      - "Session count and cluster node health"
      - "MFA challenge completion rate"
    runbooks:
      - "PingFederate cluster node replacement"
      - "Certificate and signing key rotation"
      - "Emergency bypass for authentication outage"
    staffing:
      - "2 IAM engineers for PingFederate administration"
      - "1 IAM engineer for partner onboarding and federation"

risk_assessment:
  risks:
    - id: "R-001"
      description: "Ping Identity acquired or product direction changes"
      likelihood: "low"
      impact: "high"
      mitigation:
        - "Contractual SLA with 3-year support guarantee"
        - "OIDC/SAML are open standards; migration path to any IdP exists"
        - "Authentication journey definitions exported and version-controlled"
    - id: "R-002"
      description: "Migration causes authentication outage during cutover"
      likelihood: "medium"
      impact: "critical"
      mitigation:
        - "Parallel stack deployment with DNS-based cutover"
        - "Phased migration: workforce → customers → partners"
        - "Rollback to previous IdP within 15 minutes via DNS"
  residual_risk: "low"

deployment:
  rollout_plan:
    phases:
      - name: "PoC and Validation"
        criteria: "3 relying parties integrated; authentication journey parity with ADFS"
        duration_days: 45
      - name: "Workforce SSO Migration"
        criteria: "All workforce apps migrated from ADFS; ADFS in read-only mode"
        duration_days: 90
      - name: "Customer Authentication Migration"
        criteria: "Customer-facing OIDC apps migrated; custom OIDC provider decommissioned"
        duration_days: 120
      - name: "Partner Federation"
        criteria: "All partner SAML integrations migrated and validated"
        duration_days: 60
  testing:
    unit_tests: true
    integration_tests: true
    performance_tests:
      qps_target: 10000
      p99_latency_ms: 500
    compliance_tests:
      - "SAML assertion signing verification"
      - "OIDC token binding validation"
      - "Session timeout enforcement"
      - "Account lockout policy verification"
  rollback_plan:
    criteria: "Authentication success rate < 98% or p99 latency > 1000ms"
    steps:
      - "Switch DNS to previous IdP"
      - "Verify all relying parties functional on legacy stack"
      - "Notify all integration partners"
      - "Postmortem and remediation plan"

monitoring:
  metrics:
    - name: "authentication_success_rate_percent"
      threshold_warning: 99.5
      threshold_critical: 98.0
    - name: "authentication_latency_p95_ms"
      threshold_warning: 400
      threshold_critical: 800
    - name: "active_sessions_count"
      threshold_warning: 400000
      threshold_critical: 480000
  alerts:
    - "PagerDuty: IAM on-call for authentication failures"
    - "Slack: #iam-ops for session count warnings"
  sla:
    availability_target: "99.99%"
    rpo: "<= 0 (stateless authentication; session store replicated)"
    rto: "<= 5 minutes"

dependencies:
  internal:
    - "Active Directory (workforce identity store)"
    - "LDAP directory (customer identity store)"
    - "HSM infrastructure for signing keys"
  external:
    - "Ping Identity (vendor support and licensing)"
    - "Partner banks (SAML federation agreements)"


# ADR-0003: Select PingFederate as Enterprise Identity Provider
# Organization: NovaTrust Financial Services
# Department: Identity and Access Management

adr:
  id: "ADR-0003"
  title: "Select PingFederate as the enterprise identity provider for SSO and federation"
  status: "accepted"
  created_at: "2025-11-01T08:00:00Z"
  last_modified: "2025-12-15T11:00:00Z"
  version: "1.0"
  project: "Enterprise Identity Consolidation"
  component: "Identity Provider"
  tags: ["idp", "sso", "federation", "oidc", "saml", "pingfederate"]
  priority: "critical"
  decision_type: "vendor"


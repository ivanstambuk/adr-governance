# ADR-0002: Use Reference Tokens over Self-Contained JWTs for Gateway Introspection
# Organization: NovaTrust Financial Services
# Department: Identity and Access Management

adr:
  id: "ADR-0002"
  title: "Use opaque reference tokens with introspection over self-contained JWTs for API gateway authorization"
  status: "accepted"
